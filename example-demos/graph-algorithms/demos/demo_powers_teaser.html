<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Powers of Graph Matrices</title>
<style>
html, body { width:100%; height:100%; margin:0; padding:0; background:#fff;
  font-family:"PT Sans",Arial,sans-serif; overflow:hidden }

/* ── Graph piece ─────────────────────────────────── */
.pt-graph-svg { width:100%; height:100%; display:block }
.pt-edge { stroke:#94a3b8; stroke-width:2.2; fill:none }
.pt-node { fill:#fff; stroke:#64748b; stroke-width:2.8; cursor:pointer; transition:fill .15s,stroke .15s }
.pt-node:hover { stroke:#2563eb; stroke-width:3.2 }
.pt-node-src { fill:#2563eb !important; stroke:#1e40af !important }
.pt-node-tgt { fill:#f97316 !important; stroke:#c2410c !important }
.pt-nlbl { font-size:18px; font-weight:700; fill:#334155; text-anchor:middle;
  dominant-baseline:central; pointer-events:none }
.pt-nlbl-lt { fill:#fff }

/* ── Results piece ───────────────────────────────── */
.pt-root { display:flex; flex-direction:column; height:100%; gap:8px; padding:10px 14px; overflow:hidden }
.pt-sel-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap }
.pt-sel-lbl { font-size:20px; font-weight:700; color:#475569; min-width:48px }
.pt-pill { display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px;
  border-radius:50%; border:2.5px solid #cbd5e1; background:#fff; font-size:18px; font-weight:700;
  color:#64748b; cursor:pointer; transition:all .15s; user-select:none }
.pt-pill:hover { border-color:#94a3b8; background:#f1f5f9 }
.pt-pill-src { background:#2563eb; border-color:#2563eb; color:#fff }
.pt-pill-tgt { background:#f97316; border-color:#f97316; color:#fff }
.pt-sec { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:12px 16px }
.pt-sec-mag { flex:1; display:flex; flex-direction:column; min-height:0 }
.pt-sh { display:flex; align-items:center; gap:10px; margin-bottom:8px }
.pt-st { font-size:18px; font-weight:700; color:#334155; text-transform:uppercase; letter-spacing:.04em }
.pt-sf { font-size:16px; color:#94a3b8; font-style:italic }
.pt-vr { display:flex; gap:6px }
.pt-vc { flex:1; text-align:center; background:#fff; border-radius:6px; border:1px solid #e2e8f0; padding:4px 2px }
.pt-vc-ml { font-size:14px; color:#94a3b8 }
.pt-vc-vl { font-size:32px; font-weight:700; color:#1e293b; line-height:1.2 }
.pt-vc-pr { font-size:24px; color:#475569; font-weight:600 }
.pt-msel { display:flex; align-items:center; gap:5px; margin-left:auto }
.pt-mpill { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px;
  border-radius:50%; border:2.5px solid #c7d2fe; background:#fff; font-size:17px; font-weight:700;
  color:#6366f1; cursor:pointer; transition:all .15s; user-select:none }
.pt-mpill:hover { background:#eef2ff }
.pt-mpill-sel { background:#4f46e5; border-color:#4f46e5; color:#fff }
.pt-mv { display:flex; gap:5px; margin-bottom:10px }
.pt-mc { flex:1; text-align:center; background:#fff; border-radius:6px; border:1px solid #e2e8f0; padding:5px 3px }
.pt-mc-ql { font-size:13px; color:#a1a1aa }
.pt-mc-cv { font-size:18px; color:#7c3aed; font-weight:600; white-space:nowrap }
.pt-ifft { display:flex; align-items:flex-end; gap:16px; flex:1; min-height:0 }
.pt-ifft-btn { background:#4f46e5; color:#fff; border:none; border-radius:8px; padding:12px 22px;
  font-size:17px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap;
  transition:background .15s; align-self:center; flex-shrink:0 }
.pt-ifft-btn:hover { background:#4338ca }
.pt-ifft-btn-done { background:#059669 }
.pt-ifft-btn-done:hover { background:#047857 }
.pt-pw { flex:1; display:flex; flex-direction:column; justify-content:flex-end; min-height:0;
  opacity:0; transition:opacity .45s ease-in }
.pt-pw-show { opacity:1 }
.pt-pc { display:flex; align-items:flex-end; gap:10px; flex:1; min-height:0 }
.pt-bw { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100% }
.pt-bar { background:linear-gradient(180deg,#60a5fa,#2563eb); border-radius:5px 5px 0 0; width:70%;
  max-width:56px; transition:height .55s cubic-bezier(.34,1.56,.64,1); height:0 }
.pt-bv { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:2px; opacity:0; transition:opacity .3s .3s }
.pt-bv-show { opacity:1 }
.pt-bl { font-size:14px; color:#94a3b8; margin-top:4px; white-space:nowrap }

/* ── Standalone layout ───────────────────────────── */
.pt-standalone { display:flex; height:100%; padding:14px 16px; gap:20px }
.pt-standalone-left { flex:0 0 31%; min-width:0 }
.pt-standalone-right { flex:1; display:flex; flex-direction:column; gap:8px; overflow:hidden }
</style>
</head>
<body>
<script>
(function() {
'use strict';

// ─── Hash / channel setup ──────────────────────────────────
var params = new URLSearchParams(location.hash.slice(1));
var role = params.get('role');
var piece = params.get('piece');
var channelName = 'eigendeck-demo:demo_powers_teaser.html';
var channel = new BroadcastChannel(channelName);

// ─── Constants ─────────────────────────────────────────────
var NS = 'http://www.w3.org/2000/svg';
var N = 7;
var edges = [[0,1],[0,2],[0,4],[1,4],[4,1],[2,4],[2,6],[4,3],[4,6],[6,3],[6,5],[3,2],[4,0]];
var pos = [[190,35],[70,125],[310,125],[365,225],[190,175],[95,270],[275,270]];
var edgeSet = new Set(edges.map(function(e){return e[0]+','+e[1]}));

// ─── Complex arithmetic ───────────────────────────────────
var C = {
  add: function(a,b){return [a[0]+b[0],a[1]+b[1]]},
  mul: function(a,b){return [a[0]*b[0]-a[1]*b[1],a[0]*b[1]+a[1]*b[0]]},
  exp: function(t){return [Math.cos(t),Math.sin(t)]}
};

// ─── Matrix operations (n×n complex) ──────────────────────
function mNew(n){return Array.from({length:n*n},function(){return [0,0]})}
function mEye(n){var m=mNew(n);for(var i=0;i<n;i++)m[i*n+i]=[1,0];return m}
function mMul(a,b,n){
  var c=mNew(n);
  for(var i=0;i<n;i++)for(var k=0;k<n;k++){
    var v=a[i*n+k];if(v[0]===0&&v[1]===0)continue;
    for(var j=0;j<n;j++)c[i*n+j]=C.add(c[i*n+j],C.mul(v,b[k*n+j]));
  }return c;
}
function mPow(m,p,n){
  var r=mEye(n),b=m.map(function(x){return [x[0],x[1]]});
  while(p>0){if(p&1)r=mMul(r,b,n);if(p>1)b=mMul(b,b,n);p>>=1;}return r;
}

// ─── Matrix builders ──────────────────────────────────────
function buildAdj(){var A=mNew(N);edges.forEach(function(e){A[e[0]*N+e[1]]=[1,0]});return A}
function buildRW(){
  var P=mNew(N),deg=new Array(N).fill(0);
  edges.forEach(function(e){deg[e[0]]++});
  edges.forEach(function(e){P[e[0]*N+e[1]]=[1/deg[e[0]],0]});
  for(var i=0;i<N;i++)if(deg[i]===0)P[i*N+i]=[1,0];
  return P;
}
function buildMag(q){
  var M=mNew(N),ph=2*Math.PI*q,ep=C.exp(ph),em=C.exp(-ph);
  edges.forEach(function(e){
    M[e[0]*N+e[1]]=C.add(M[e[0]*N+e[1]],ep);
    M[e[1]*N+e[0]]=C.add(M[e[1]*N+e[0]],em);
  });return M;
}

// ─── Precompute all matrix powers ─────────────────────────
function precomputeAll(){
  var A=buildAdj(),P=buildRW(),ap={},rp={},mp={};
  for(var m=1;m<=5;m++){
    ap[m]=mPow(A,m,N); rp[m]=mPow(P,m,N); mp[m]=[];
    for(var j=0;j<=m;j++){var q=j/(2*(m+1));mp[m].push(mPow(buildMag(q),m,N))}
  }
  return {adjPow:ap,rwPow:rp,magPow:mp};
}

// ─── Walk profile via IFFT ────────────────────────────────
function getProfile(m,u,v,magPow){
  var nq=m+1,S=[];
  for(var j=0;j<nq;j++){
    var q=j/(2*nq),val=magPow[m][j][u*N+v];
    S.push(C.mul(C.exp(2*Math.PI*q*m),val));
  }
  var phi=[];
  for(var k=0;k<nq;k++){
    var sum=[0,0];
    for(var j2=0;j2<nq;j2++)sum=C.add(sum,C.mul(C.exp(-2*Math.PI*j2*k/nq),S[j2]));
    phi.push(Math.round(sum[0]/nq));
  }
  return phi;
}

// ─── Derive full display state ────────────────────────────
function deriveState(base,powers){
  var src=base.src,tgt=base.tgt,selM=base.selM;
  var wc=[],rv=[];
  for(var m=1;m<=5;m++){
    wc.push(Math.round(powers.adjPow[m][src*N+tgt][0]));
    rv.push(powers.rwPow[m][src*N+tgt][0]);
  }
  var nq=selM+1,mv=[];
  for(var j=0;j<nq;j++){
    var val=powers.magPow[selM][j][src*N+tgt];
    mv.push({qLabel:fmtQ(j,selM),re:val[0],im:val[1]});
  }
  var wp=base.ifftShown?getProfile(selM,src,tgt,powers.magPow):null;
  return {
    type:'state',N:N,edges:edges,pos:pos,
    src:src,tgt:tgt,selM:selM,ifftShown:base.ifftShown,nextSel:base.nextSel,
    walkCounts:wc,rwValues:rv,magValues:mv,walkProfile:wp
  };
}

// ─── Formatting ───────────────────────────────────────────
function fmtN(x){
  if(Math.abs(x-Math.round(x))<0.01)return Math.round(x).toString();
  return Math.abs(x)<0.005?'0':x.toFixed(2);
}
function fmtC(z){
  var r=z[0],i=z[1];
  if(Math.abs(r)<0.005)r=0;if(Math.abs(i)<0.005)i=0;
  if(i===0)return fmtN(r);
  var s=i>0?'+':'\u2212',ai=Math.abs(i);
  var is=Math.abs(ai-1)<0.01?'i':fmtN(ai)+'i';
  if(r===0)return(i<0?'\u2212':'')+is;
  return fmtN(r)+' '+s+' '+is;
}
function gcd(a,b){return b===0?a:gcd(b,a%b)}
function fmtQ(j,m){
  var d=2*(m+1);if(j===0)return '0';
  var g=gcd(j,d);return(j/g)+'/'+(d/g);
}

// ─── SVG helper ───────────────────────────────────────────
function svgEl(tag,attrs){
  var e=document.createElementNS(NS,tag);
  if(attrs)Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k])});
  return e;
}

// ─── Render graph into an SVG element ─────────────────────
function renderGraph(svg,s,onNodeClick){
  svg.innerHTML='';
  var R=20;
  var defs=svgEl('defs');
  var mk=svgEl('marker',{id:'pt-ah',viewBox:'0 0 10 10',refX:'9',refY:'5',
    markerWidth:'7',markerHeight:'7',orient:'auto',markerUnits:'userSpaceOnUse'});
  mk.appendChild(svgEl('path',{d:'M0 0L10 5L0 10z',fill:'#94a3b8'}));
  defs.appendChild(mk);svg.appendChild(defs);

  s.edges.forEach(function(edge){
    var u=edge[0],v=edge[1];
    var x1=s.pos[u][0],y1=s.pos[u][1],x2=s.pos[v][0],y2=s.pos[v][1];
    var dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
    var ux=dx/len,uy=dy/len;
    var recip=edgeSet.has(v+','+u);
    if(recip){
      var lo=Math.min(u,v),hi=Math.max(u,v);
      var rx1=s.pos[lo][0],ry1=s.pos[lo][1],rx2=s.pos[hi][0],ry2=s.pos[hi][1];
      var rdx=rx2-rx1,rdy=ry2-ry1,rlen=Math.hypot(rdx,rdy);
      var cnx=-rdy/rlen,cny=rdx/rlen;
      var curve=u<v?22:-22;
      var mx=(x1+x2)/2+cnx*curve,my=(y1+y2)/2+cny*curve;
      var tcx=mx-x1,tcy=my-y1,tcl=Math.hypot(tcx,tcy);
      var sx=x1+(tcx/tcl)*(R+2),sy=y1+(tcy/tcl)*(R+2);
      var fcx=x2-mx,fcy=y2-my,fcl=Math.hypot(fcx,fcy);
      var ex=x2-(fcx/fcl)*(R+10),ey=y2-(fcy/fcl)*(R+10);
      svg.appendChild(svgEl('path',{
        d:'M'+sx+' '+sy+' Q'+mx+' '+my+' '+ex+' '+ey,
        class:'pt-edge','marker-end':'url(#pt-ah)'}));
    }else{
      var sx2=x1+ux*(R+2),sy2=y1+uy*(R+2);
      var ex2=x2-ux*(R+10),ey2=y2-uy*(R+10);
      svg.appendChild(svgEl('line',{
        x1:sx2,y1:sy2,x2:ex2,y2:ey2,
        class:'pt-edge','marker-end':'url(#pt-ah)'}));
    }
  });

  for(var i=0;i<s.N;i++){
    var x=s.pos[i][0],y=s.pos[i][1];
    var isSrc=i===s.src,isTgt=i===s.tgt;
    var cls='pt-node'+(isSrc?' pt-node-src':'')+(isTgt?' pt-node-tgt':'');
    var circ=svgEl('circle',{cx:x,cy:y,r:R,class:cls});
    if(onNodeClick)(function(idx){circ.addEventListener('click',function(){onNodeClick(idx)})})(i);
    svg.appendChild(circ);
    var lbl=svgEl('text',{x:x,y:y,class:'pt-nlbl'+(isSrc||isTgt?' pt-nlbl-lt':'')});
    lbl.textContent=(i+1).toString();
    svg.appendChild(lbl);
  }
}

// ─── Create results DOM structure ─────────────────────────
function createResultsRoot(){
  var root=document.createElement('div');
  root.className='pt-root';
  root.innerHTML=
    '<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">'+
      '<div class="pt-sel-row"><span class="pt-sel-lbl">From</span><span class="pt-src-pills"></span></div>'+
      '<div class="pt-sel-row"><span class="pt-sel-lbl">To</span><span class="pt-tgt-pills"></span></div>'+
    '</div>'+
    '<div class="pt-sec">'+
      '<div class="pt-sh"><span class="pt-st">Walk Counts</span>'+
        '<span class="pt-sf">[A<sup>m</sup>]<sub>u,v</sub> &nbsp;=&nbsp; # directed walks of length m</span></div>'+
      '<div class="pt-vr pt-walk-vals"></div>'+
    '</div>'+
    '<div class="pt-sec">'+
      '<div class="pt-sh"><span class="pt-st">Random Walk</span>'+
        '<span class="pt-sf">[P<sup>m</sup>]<sub>u,v</sub> &nbsp;=&nbsp; landing probability after m steps</span></div>'+
      '<div class="pt-vr pt-rw-vals"></div>'+
    '</div>'+
    '<div class="pt-sec pt-sec-mag">'+
      '<div class="pt-sh">'+
        '<span class="pt-st">Magnetic Matrix</span>'+
        '<span class="pt-sf">[A<sub>q</sub><sup>m</sup>]<sub>u,v</sub></span>'+
        '<div class="pt-msel"><span style="font-size:16px;color:#94a3b8;margin-right:3px">m =</span><span class="pt-m-pills"></span></div>'+
      '</div>'+
      '<div class="pt-mv pt-mag-vals"></div>'+
      '<div class="pt-ifft">'+
        '<button class="pt-ifft-btn">Inverse FFT &#9654;</button>'+
        '<div class="pt-pw">'+
          '<div class="pt-pc"></div>'+
          '<div style="text-align:center;font-size:15px;color:#94a3b8;margin-top:3px">&#8592; # forward edges k &#8594;</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  return root;
}

// ─── Update results DOM from state ────────────────────────
function updateResults(root,s,handlers){
  // Source pills
  var srcP=root.querySelector('.pt-src-pills');srcP.innerHTML='';
  for(var i=0;i<s.N;i++){
    var p=document.createElement('span');
    p.className='pt-pill'+(i===s.src?' pt-pill-src':'');
    p.textContent=i+1;
    (function(idx){p.onclick=function(){handlers.onSetSource(idx)}})(i);
    srcP.appendChild(p);
  }
  // Target pills
  var tgtP=root.querySelector('.pt-tgt-pills');tgtP.innerHTML='';
  for(var i2=0;i2<s.N;i2++){
    var p2=document.createElement('span');
    p2.className='pt-pill'+(i2===s.tgt?' pt-pill-tgt':'');
    p2.textContent=i2+1;
    (function(idx){p2.onclick=function(){handlers.onSetTarget(idx)}})(i2);
    tgtP.appendChild(p2);
  }
  // Walk counts
  root.querySelector('.pt-walk-vals').innerHTML=s.walkCounts.map(function(v,i){
    return '<div class="pt-vc"><div class="pt-vc-ml">m='+(i+1)+'</div><div class="pt-vc-vl">'+v+'</div></div>';
  }).join('');
  // Random walk
  root.querySelector('.pt-rw-vals').innerHTML=s.rwValues.map(function(v,i){
    var txt=Math.abs(v)<0.0005?'0':v.toFixed(3);
    return '<div class="pt-vc"><div class="pt-vc-ml">m='+(i+1)+'</div><div class="pt-vc-vl pt-vc-pr">'+txt+'</div></div>';
  }).join('');
  // M pills
  var mp=root.querySelector('.pt-m-pills');mp.innerHTML='';
  for(var m=1;m<=5;m++){
    var pm=document.createElement('span');
    pm.className='pt-mpill'+(m===s.selM?' pt-mpill-sel':'');
    pm.textContent=m;
    (function(mm){pm.onclick=function(){handlers.onSetM(mm)}})(m);
    mp.appendChild(pm);
  }
  // Magnetic values
  root.querySelector('.pt-mag-vals').innerHTML=s.magValues.map(function(v){
    return '<div class="pt-mc"><div class="pt-mc-ql">q = '+v.qLabel+'</div>'+
      '<div class="pt-mc-cv">'+fmtC([v.re,v.im])+'</div></div>';
  }).join('');
  // IFFT button + profile chart
  var btn=root.querySelector('.pt-ifft-btn');
  btn.onclick=handlers.onToggleIfft;
  var pw=root.querySelector('.pt-pw');
  var pc=root.querySelector('.pt-pc');
  if(!s.ifftShown||!s.walkProfile){
    pw.classList.remove('pt-pw-show');pc.innerHTML='';
    btn.textContent='Inverse FFT \u25B6';
    btn.classList.remove('pt-ifft-btn-done');
    return;
  }
  var phi=s.walkProfile,maxVal=Math.max.apply(null,phi.concat([1]));
  pc.innerHTML='';
  for(var k=0;k<phi.length;k++){
    var h=Math.max(phi[k]/maxVal*100,phi[k]>0?8:2);
    var bw=document.createElement('div');bw.className='pt-bw';
    var bv=document.createElement('div');bv.className='pt-bv pt-bv-show';bv.textContent=phi[k];
    var bar=document.createElement('div');bar.className='pt-bar';
    var bl=document.createElement('div');bl.className='pt-bl';bl.textContent='k='+k;
    bw.appendChild(bv);bw.appendChild(bar);bw.appendChild(bl);pc.appendChild(bw);
    (function(b,height){requestAnimationFrame(function(){requestAnimationFrame(function(){b.style.height=height+'%'})})})(bar,h);
  }
  pw.classList.add('pt-pw-show');
  btn.textContent='Walk Profiles \u2714';
  btn.classList.add('pt-ifft-btn-done');
}

// ─── Controller ───────────────────────────────────────────
function setupController(){
  document.body.style.display='none';
  var powers=precomputeAll();
  var base={src:0,tgt:3,selM:3,ifftShown:false,nextSel:'src'};

  function broadcast(){channel.postMessage(deriveState(base,powers))}

  channel.onmessage=function(e){
    var d=e.data;
    if(d.type==='request-state'){broadcast();return}
    if(d.type==='click-node'){
      if(base.nextSel==='src'){base.src=d.nodeId;base.nextSel='tgt'}
      else{base.tgt=d.nodeId;base.nextSel='src'}
      base.ifftShown=false;
    }
    if(d.type==='set-source'){base.src=d.nodeId;base.nextSel='tgt';base.ifftShown=false}
    if(d.type==='set-target'){base.tgt=d.nodeId;base.nextSel='src';base.ifftShown=false}
    if(d.type==='set-m'){base.selM=d.m;base.ifftShown=false}
    if(d.type==='toggle-ifft'){base.ifftShown=!base.ifftShown}
    broadcast();
  };
  broadcast();
}

// ─── Graph viewport ───────────────────────────────────────
function setupGraphViewport(){
  var svg=svgEl('svg',{viewBox:'0 0 420 310'});
  svg.classList.add('pt-graph-svg');
  document.body.appendChild(svg);

  function onNodeClick(i){channel.postMessage({type:'click-node',nodeId:i})}
  channel.onmessage=function(e){
    if(e.data.type==='state')renderGraph(svg,e.data,onNodeClick);
  };
  channel.postMessage({type:'request-state'});
}

// ─── Results viewport ─────────────────────────────────────
function setupResultsViewport(){
  var root=createResultsRoot();
  document.body.appendChild(root);
  var handlers={
    onSetSource:function(i){channel.postMessage({type:'set-source',nodeId:i})},
    onSetTarget:function(i){channel.postMessage({type:'set-target',nodeId:i})},
    onSetM:function(m){channel.postMessage({type:'set-m',m:m})},
    onToggleIfft:function(){channel.postMessage({type:'toggle-ifft'})}
  };
  channel.onmessage=function(e){
    if(e.data.type==='state')updateResults(root,e.data,handlers);
  };
  channel.postMessage({type:'request-state'});
}

// ─── Standalone fallback ──────────────────────────────────
function setupStandalone(){
  var powers=precomputeAll();
  var base={src:0,tgt:3,selM:3,ifftShown:false,nextSel:'src'};

  var app=document.createElement('div');app.className='pt-standalone';
  var left=document.createElement('div');left.className='pt-standalone-left';
  var svg=svgEl('svg',{viewBox:'0 0 420 310'});
  svg.classList.add('pt-graph-svg');
  left.appendChild(svg);

  var right=document.createElement('div');right.className='pt-standalone-right';
  var resultsRoot=createResultsRoot();
  // Reparent results children into right (which has the flex styling)
  while(resultsRoot.firstChild)right.appendChild(resultsRoot.firstChild);
  // Copy the flex/gap from pt-root to right
  right.style.padding='10px 14px';

  app.appendChild(left);app.appendChild(right);
  document.body.appendChild(app);

  function refresh(){
    var s=deriveState(base,powers);
    renderGraph(svg,s,onNodeClick);
    updateResults(right,s,handlers);
  }
  function onNodeClick(i){
    if(base.nextSel==='src'){base.src=i;base.nextSel='tgt'}
    else{base.tgt=i;base.nextSel='src'}
    base.ifftShown=false;refresh();
  }
  var handlers={
    onSetSource:function(i){base.src=i;base.nextSel='tgt';base.ifftShown=false;refresh()},
    onSetTarget:function(i){base.tgt=i;base.nextSel='src';base.ifftShown=false;refresh()},
    onSetM:function(m){base.selM=m;base.ifftShown=false;refresh()},
    onToggleIfft:function(){base.ifftShown=!base.ifftShown;refresh()}
  };
  refresh();
}

// ─── Init ─────────────────────────────────────────────────
function init(){
  if(role==='controller')return setupController();
  if(piece==='graph')return setupGraphViewport();
  if(piece==='results')return setupResultsViewport();
  // Standalone fallback
  setupStandalone();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{init()}

})();
</script>
</body>
</html>
