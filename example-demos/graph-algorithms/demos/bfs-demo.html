<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      height: 100vh;
    }
    canvas {
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      flex: 1;
      max-height: calc(100% - 60px);
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      padding: 8px 20px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #f0f0f0; }
    .info {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="700" height="320"></canvas>
  <div class="controls">
    <button id="step">Step BFS</button>
    <button id="reset">Reset</button>
  </div>
  <div class="info" id="info">Click "Step BFS" to begin traversal from node 0</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');

    // --- Graph definition ---
    const nodes = [
      { id: 0, x: 100, y: 160, label: '0' },
      { id: 1, x: 220, y: 80,  label: '1' },
      { id: 2, x: 220, y: 240, label: '2' },
      { id: 3, x: 360, y: 80,  label: '3' },
      { id: 4, x: 360, y: 240, label: '4' },
      { id: 5, x: 500, y: 120, label: '5' },
      { id: 6, x: 500, y: 200, label: '6' },
      { id: 7, x: 620, y: 160, label: '7' },
    ];

    const edges = [
      [0,1],[0,2],[1,3],[2,4],[3,5],[4,6],[5,7],[6,7],[1,2],[3,4]
    ];

    // --- BFS state ---
    const UNVISITED = 0, QUEUED = 1, VISITED = 2;
    let state, queue, visitOrder, currentLevel;

    function resetBFS() {
      state = nodes.map(() => UNVISITED);
      queue = [0];
      state[0] = QUEUED;
      visitOrder = [];
      currentLevel = 0;
      info.textContent = 'Click "Step BFS" to begin traversal from node 0';
      draw();
    }

    function stepBFS() {
      if (queue.length === 0) {
        info.textContent = `BFS complete. Visit order: [${visitOrder.join(', ')}]`;
        return;
      }

      // Process entire current level
      const levelSize = queue.length;
      const levelNodes = [];

      for (let i = 0; i < levelSize; i++) {
        const node = queue.shift();
        state[node] = VISITED;
        visitOrder.push(node);
        levelNodes.push(node);

        // Enqueue unvisited neighbors
        for (const [a, b] of edges) {
          const neighbor = a === node ? b : b === node ? a : -1;
          if (neighbor >= 0 && state[neighbor] === UNVISITED) {
            state[neighbor] = QUEUED;
            queue.push(neighbor);
          }
        }
      }

      currentLevel++;
      info.textContent = `Level ${currentLevel - 1}: visited [${levelNodes.join(', ')}] | Queue: [${queue.join(', ')}]`;
      draw();
    }

    // --- Drawing ---
    const COLORS = {
      [UNVISITED]: { fill: '#f5f5f5', stroke: '#ccc', text: '#999' },
      [QUEUED]:    { fill: '#fff3cd', stroke: '#f0ad4e', text: '#856404' },
      [VISITED]:   { fill: '#d4edda', stroke: '#28a745', text: '#155724' },
    };

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw edges
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1.5;
      for (const [a, b] of edges) {
        ctx.beginPath();
        ctx.moveTo(nodes[a].x, nodes[a].y);
        ctx.lineTo(nodes[b].x, nodes[b].y);
        ctx.stroke();
      }

      // Draw nodes
      const R = 24;
      for (const node of nodes) {
        const c = COLORS[state[node.id]];
        ctx.beginPath();
        ctx.arc(node.x, node.y, R, 0, Math.PI * 2);
        ctx.fillStyle = c.fill;
        ctx.fill();
        ctx.strokeStyle = c.stroke;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = c.text;
        ctx.font = 'bold 16px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.label, node.x, node.y);
      }

      // Legend
      ctx.font = '12px system-ui';
      ctx.textAlign = 'left';
      const legend = [
        { label: 'Unvisited', color: COLORS[UNVISITED] },
        { label: 'In queue',  color: COLORS[QUEUED] },
        { label: 'Visited',   color: COLORS[VISITED] },
      ];
      legend.forEach((item, i) => {
        const lx = 560, ly = 20 + i * 22;
        ctx.beginPath();
        ctx.arc(lx, ly, 7, 0, Math.PI * 2);
        ctx.fillStyle = item.color.fill;
        ctx.fill();
        ctx.strokeStyle = item.color.stroke;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.fillText(item.label, lx + 14, ly + 4);
      });
    }

    // --- Event listeners ---
    document.getElementById('step').addEventListener('click', stepBFS);
    document.getElementById('reset').addEventListener('click', resetBFS);

    resetBFS();
  </script>
</body>
</html>
