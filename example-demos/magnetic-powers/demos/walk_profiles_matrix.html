<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Walk Profiles Matrix</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#fff;
  font-family:'PT Sans',Arial,sans-serif; }

/* ── Graph piece ─────────────────────────────────── */
.wp-graph-svg { width:100%; height:100%; display:block; }
.wp-edge { stroke:#94a3b8; stroke-width:2.2; fill:none; }
.wp-node { fill:#fff; stroke:#64748b; stroke-width:2.8; cursor:pointer; transition:fill .15s,stroke .15s }
.wp-node:hover { stroke:#2563eb; stroke-width:3.2 }
.wp-node-src { fill:#dbeafe !important; stroke:#2563eb !important; stroke-width:3.5 !important }
.wp-node-tgt { fill:#ffedd5 !important; stroke:#f97316 !important; stroke-width:3.5 !important }
.wp-nlbl { font-size:22px; font-weight:700; fill:#334155; text-anchor:middle;
  dominant-baseline:central; pointer-events:none }
.wp-nlbl-lt { fill:#334155 }
.wp-walk-edge { stroke-width:3.5; fill:none; opacity:0 }
.wp-walk-edge-show { opacity:0.5 }
.wp-walk-fwd { stroke:#6366f1 }
.wp-walk-bwd { stroke:#e11d48 }

/* ── Matrix piece ────────────────────────────────── */
.wp-mat { width:100%; height:100%; display:flex; flex-direction:column; padding:12px 16px; overflow:hidden; }
.wp-mat-selectors { display:flex; align-items:center; gap:18px; margin-bottom:14px; flex-wrap:wrap; }
.wp-mat-sel-label { font-size:28px; font-weight:700; color:#475569; }
.wp-pill { display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px;
  border-radius:50%; border:2.5px solid #cbd5e1; background:#fff; font-size:26px; font-weight:700;
  color:#64748b; cursor:pointer; transition:all .15s; user-select:none }
.wp-pill:hover { border-color:#94a3b8; background:#f1f5f9 }
.wp-pill-sel { background:#4f46e5; border-color:#4f46e5; color:#fff }
.wp-pill-k-sel { background:#0891b2; border-color:#0891b2; color:#fff }
.wp-grid-wrap { flex:1; display:flex; align-items:center; justify-content:center; min-height:0; overflow:auto; }
.wp-grid { border-collapse:collapse; }
.wp-grid th { font-size:26px; font-weight:700; color:#94a3b8; padding:4px 8px; text-align:center; }
.wp-grid td { text-align:center; padding:0; }
.wp-cell { width:60px; height:60px; display:flex; align-items:center; justify-content:center;
  font-size:32px; font-weight:700; color:#1e293b; border:2px solid #e5e7eb; border-radius:6px;
  cursor:pointer; transition:all .15s; user-select:none; margin:2px; }
.wp-cell:hover { border-color:#6366f1; background:#f5f3ff; }
.wp-cell-active { border-color:#6366f1; background:#ede9fe; box-shadow:0 0 0 2px #6366f1; }
.wp-cell-zero { color:#d1d5db; }
.wp-cell-src { background:#dbeafe; }
.wp-cell-tgt { background:#ffedd5; }

/* ── Walks piece ─────────────────────────────────── */
.wp-walks { width:100%; height:100%; display:flex; flex-direction:column; padding:12px 16px; overflow:hidden; }
.wp-walks-title { font-size:28px; font-weight:700; color:#334155; margin-bottom:8px; }
.wp-walks-subtitle { font-size:22px; color:#94a3b8; margin-bottom:12px; }
.wp-walks-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
.wp-walk-item { display:flex; align-items:center; gap:5px; padding:8px 12px;
  background:#f8fafc; border:1px solid #e5e7eb; border-radius:8px; flex-wrap:wrap;
  cursor:pointer; transition:background .15s; }
.wp-walk-item:hover { background:#ede9fe; }
.wp-walk-item-active { background:#ede9fe; border-color:#6366f1; }
.wp-walk-node { font-size:26px; font-weight:700; color:#334155;
  width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center;
  border-radius:50%; background:#fff; border:2px solid #cbd5e1; }
.wp-walk-node-src { border-color:#2563eb; background:#dbeafe; }
.wp-walk-node-tgt { border-color:#f97316; background:#ffedd5; }
.wp-walk-arrow { font-size:26px; font-weight:700; margin:0 3px; }
.wp-walk-fwd-arrow { color:#6366f1; }
.wp-walk-bwd-arrow { color:#e11d48; }
.wp-walks-empty { font-size:24px; color:#94a3b8; font-style:italic; padding:20px 0; }

/* ── Standalone ──────────────────────────────────── */
.wp-standalone { display:flex; height:100%; padding:10px; gap:10px; }
.wp-standalone-graph { flex:0 0 28%; }
.wp-standalone-matrix { flex:0 0 38%; }
.wp-standalone-walks { flex:1; }
</style>
</head>
<body>
<script>
(function() {
'use strict';

var params = new URLSearchParams(location.hash.slice(1));
var role = params.get('role');
var piece = params.get('piece');
var channelName = 'eigendeck-demo:walk_profiles_matrix.html';
var channel = new BroadcastChannel(channelName);

// ─── Graph constants (same as demo_powers_teaser) ─
var NS = 'http://www.w3.org/2000/svg';
var NNODE = 7;
var edges = [[0,1],[0,2],[0,4],[1,4],[4,1],[2,4],[2,6],[4,3],[4,6],[6,3],[6,5],[3,2],[4,0]];
var pos = [[190,35],[70,125],[310,125],[365,225],[190,175],[95,270],[275,270]];
var edgeSet = new Set(edges.map(function(e){return e[0]+','+e[1]}));

// ─── Complex arithmetic ──────────────────────────
function cAdd(a,b){return [a[0]+b[0],a[1]+b[1]]}
function cMul(a,b){return [a[0]*b[0]-a[1]*b[1],a[0]*b[1]+a[1]*b[0]]}
function cExp(t){return [Math.cos(t),Math.sin(t)]}

// ─── Matrix ops (NxN complex) ────────────────────
function mNew(n){return Array.from({length:n*n},function(){return [0,0]})}
function mEye(n){var m=mNew(n);for(var i=0;i<n;i++)m[i*n+i]=[1,0];return m}
function mMul(a,b,n){
  var c=mNew(n);
  for(var i=0;i<n;i++)for(var k=0;k<n;k++){
    var v=a[i*n+k];if(v[0]===0&&v[1]===0)continue;
    for(var j=0;j<n;j++)c[i*n+j]=cAdd(c[i*n+j],cMul(v,b[k*n+j]));
  }return c;
}
function mPow(m,p,n){
  var r=mEye(n),b=m.map(function(x){return [x[0],x[1]]});
  while(p>0){if(p&1)r=mMul(r,b,n);if(p>1)b=mMul(b,b,n);p>>=1;}return r;
}

// ─── Build magnetic matrix ───────────────────────
function buildMag(q){
  var M=mNew(NNODE),ph=2*Math.PI*q,ep=cExp(ph),em=cExp(-ph);
  edges.forEach(function(e){
    M[e[0]*NNODE+e[1]]=cAdd(M[e[0]*NNODE+e[1]],ep);
    M[e[1]*NNODE+e[0]]=cAdd(M[e[1]*NNODE+e[0]],em);
  });return M;
}

// ─── Precompute magnetic powers for all m ────────
function precompute(){
  var mp={};
  for(var m=1;m<=6;m++){
    mp[m]=[];
    for(var j=0;j<=m;j++){
      var q=j/(2*(m+1));
      mp[m].push(mPow(buildMag(q),m,NNODE));
    }
  }
  return mp;
}

// ─── Walk profile via IFFT ───────────────────────
function getProfile(m,u,v,magPow){
  var nq=m+1,S=[];
  for(var j=0;j<nq;j++){
    var q=j/(2*nq),val=magPow[m][j][u*NNODE+v];
    S.push(cMul(cExp(2*Math.PI*q*m),val));
  }
  var phi=[];
  for(var k=0;k<nq;k++){
    var sum=[0,0];
    for(var j2=0;j2<nq;j2++)sum=cAdd(sum,cMul(cExp(-2*Math.PI*j2*k/nq),S[j2]));
    phi.push(Math.round(sum[0]/nq));
  }
  return phi;
}

// ─── Get full 7x7 matrix for given m,k ──────────
function getMatrix(m,k,magPow){
  var mat=[];
  for(var u=0;u<NNODE;u++){
    mat[u]=[];
    for(var v=0;v<NNODE;v++){
      var prof=getProfile(m,u,v,magPow);
      mat[u][v]=k<prof.length?prof[k]:0;
    }
  }
  return mat;
}

// ─── Enumerate walks ─────────────────────────────
// From each node, build move list: [{to, fwd}]
// fwd=true if traversing a directed edge forward
function buildMoveList(){
  var moves=[];
  for(var i=0;i<NNODE;i++) moves[i]=[];
  edges.forEach(function(e){
    // Forward: from e[0] to e[1]
    moves[e[0]].push({to:e[1], fwd:true});
    // Backward: from e[1] to e[0]
    moves[e[1]].push({to:e[0], fwd:false});
  });
  return moves;
}

var MOVES = buildMoveList();

function enumerateWalks(src, tgt, m, k) {
  var results = [];
  var MAX_RESULTS = 200;

  // DFS: path is array of node indices, fwdCount tracks forward edges
  function dfs(node, step, fwdCount, path, arrows) {
    if (results.length >= MAX_RESULTS) return;
    if (step === m) {
      if (node === tgt && fwdCount === k) {
        results.push({path: path.slice(), arrows: arrows.slice()});
      }
      return;
    }
    // Prune: remaining steps
    var remaining = m - step;
    // fwdCount can increase by at most remaining
    if (fwdCount + remaining < k) return;
    // fwdCount already exceeds k
    if (fwdCount > k) return;

    var mv = MOVES[node];
    for (var i = 0; i < mv.length; i++) {
      var newFwd = fwdCount + (mv[i].fwd ? 1 : 0);
      path.push(mv[i].to);
      arrows.push(mv[i].fwd);
      dfs(mv[i].to, step + 1, newFwd, path, arrows);
      path.pop();
      arrows.pop();
    }
  }

  dfs(src, 0, 0, [src], []);
  return results;
}

// ─── SVG helpers ─────────────────────────────────
function svgEl(tag,attrs){
  var e=document.createElementNS(NS,tag);
  if(attrs)Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k])});
  return e;
}

function renderGraph(svg, s, onNodeClick) {
  svg.innerHTML='';
  var R=20;
  var defs=svgEl('defs');
  var mk=svgEl('marker',{id:'wp-ah',viewBox:'0 0 10 10',refX:'9',refY:'5',
    markerWidth:'7',markerHeight:'7',orient:'auto',markerUnits:'userSpaceOnUse'});
  mk.appendChild(svgEl('path',{d:'M0 0L10 5L0 10z',fill:'#94a3b8'}));
  defs.appendChild(mk);svg.appendChild(defs);

  edges.forEach(function(edge){
    var u=edge[0],v=edge[1];
    var x1=pos[u][0],y1=pos[u][1],x2=pos[v][0],y2=pos[v][1];
    var dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
    var ux=dx/len,uy=dy/len;
    var recip=edgeSet.has(v+','+u);
    if(recip){
      var lo=Math.min(u,v),hi=Math.max(u,v);
      var rx1=pos[lo][0],ry1=pos[lo][1],rx2=pos[hi][0],ry2=pos[hi][1];
      var rdx=rx2-rx1,rdy=ry2-ry1,rlen=Math.hypot(rdx,rdy);
      var cnx=-rdy/rlen,cny=rdx/rlen;
      var curve=u<v?22:-22;
      var mx=(x1+x2)/2+cnx*curve,my=(y1+y2)/2+cny*curve;
      var tcx=mx-x1,tcy=my-y1,tcl=Math.hypot(tcx,tcy);
      var sx=x1+(tcx/tcl)*(R+2),sy=y1+(tcy/tcl)*(R+2);
      var fcx=x2-mx,fcy=y2-my,fcl=Math.hypot(fcx,fcy);
      var ex=x2-(fcx/fcl)*(R+10),ey=y2-(fcy/fcl)*(R+10);
      svg.appendChild(svgEl('path',{
        d:'M'+sx+' '+sy+' Q'+mx+' '+my+' '+ex+' '+ey,
        class:'wp-edge','marker-end':'url(#wp-ah)'}));
    }else{
      var sx2=x1+ux*(R+2),sy2=y1+uy*(R+2);
      var ex2=x2-ux*(R+10),ey2=y2-uy*(R+10);
      svg.appendChild(svgEl('line',{
        x1:sx2,y1:sy2,x2:ex2,y2:ey2,
        class:'wp-edge','marker-end':'url(#wp-ah)'}));
    }
  });

  for(var i=0;i<NNODE;i++){
    var x=pos[i][0],y=pos[i][1];
    var isSrc=i===s.cellU,isTgt=i===s.cellV;
    var cls='wp-node'+(isSrc?' wp-node-src':'')+(isTgt?' wp-node-tgt':'');
    var circ=svgEl('circle',{cx:x,cy:y,r:R,class:cls});
    if(onNodeClick)(function(idx){circ.addEventListener('click',function(){onNodeClick(idx)})})(i);
    svg.appendChild(circ);
    var lbl=svgEl('text',{x:x,y:y,class:'wp-nlbl'});
    lbl.textContent=(i+1).toString();
    svg.appendChild(lbl);
  }
}

// ═══════════════════════════════════════════════════
// CONTROLLER
// ═══════════════════════════════════════════════════
if (role === 'controller') {
  if(document.body) document.body.style.display='none';
  else document.addEventListener('DOMContentLoaded',function(){document.body.style.display='none'});

  var magPow = precompute();
  var state = { src:0, tgt:3, selM:3, selK:0, cellU:-1, cellV:-1, hovWalk:-1 };

  function deriveAndBroadcast(){
    var mat = getMatrix(state.selM, state.selK, magPow);
    var walks = null;
    if(state.cellU>=0 && state.cellV>=0){
      walks = enumerateWalks(state.cellU, state.cellV, state.selM, state.selK);
    }
    channel.postMessage({
      type:'state',
      src:state.src, tgt:state.tgt,
      selM:state.selM, selK:state.selK,
      cellU:state.cellU, cellV:state.cellV,
      mat:mat, walks:walks, hovWalk:state.hovWalk,
      N:NNODE, edges:edges, pos:pos
    });
  }

  channel.onmessage=function(e){
    var d=e.data;
    if(d.type==='request-state'){deriveAndBroadcast();return}
    if(d.type==='click-node'){
      state.src=d.nodeId; state.cellU=-1; state.cellV=-1; state.hovWalk=-1;
    }
    if(d.type==='set-m'){
      state.selM=d.m;
      if(state.selK>d.m) state.selK=d.m;
      state.cellU=-1; state.cellV=-1; state.hovWalk=-1;
    }
    if(d.type==='set-k'){state.selK=d.k; state.cellU=-1; state.cellV=-1; state.hovWalk=-1}
    if(d.type==='click-cell'){state.cellU=d.u; state.cellV=d.v; state.hovWalk=-1}
    if(d.type==='hover-walk'){state.hovWalk=d.idx}
    deriveAndBroadcast();
  };
  deriveAndBroadcast();
  return;
}

// ═══════════════════════════════════════════════════
// GRAPH PIECE
// ═══════════════════════════════════════════════════
if (piece === 'graph') {
  function setupGraph(){
    var svg=svgEl('svg',{viewBox:'0 0 420 310'});
    svg.classList.add('wp-graph-svg');
    document.body.appendChild(svg);

    var lastWalk=null;

    function onNodeClick(i){channel.postMessage({type:'click-node',nodeId:i})}

    function drawWalkOverlay(svg,s){
      // Remove old walk edges
      svg.querySelectorAll('.wp-walk-edge').forEach(function(el){el.remove()});
      if(!s.walks||s.hovWalk<0||s.hovWalk>=s.walks.length) return;
      var w=s.walks[s.hovWalk];
      var R=20;
      for(var step=0;step<w.arrows.length;step++){
        var fromNode=w.path[step], toNode=w.path[step+1];
        var x1=pos[fromNode][0],y1=pos[fromNode][1];
        var x2=pos[toNode][0],y2=pos[toNode][1];
        var dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
        var ux=dx/len,uy=dy/len;
        var offset=(step-w.arrows.length/2)*3;
        var cls='wp-walk-edge wp-walk-edge-show '+(w.arrows[step]?'wp-walk-fwd':'wp-walk-bwd');
        var line=svgEl('line',{
          x1:x1+ux*(R+4)+(-uy)*offset, y1:y1+uy*(R+4)+ux*offset,
          x2:x2-ux*(R+4)+(-uy)*offset, y2:y2-uy*(R+4)+ux*offset,
          class:cls
        });
        svg.appendChild(line);
      }
    }

    channel.onmessage=function(e){
      if(e.data.type==='state'){
        renderGraph(svg,e.data,onNodeClick);
        drawWalkOverlay(svg,e.data);
      }
    };
    channel.postMessage({type:'request-state'});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',setupGraph);
  else setupGraph();
  return;
}

// ═══════════════════════════════════════════════════
// MATRIX PIECE
// ═══════════════════════════════════════════════════
if (piece === 'matrix') {
  function setupMatrix(){
    var container=document.createElement('div');
    container.className='wp-mat';
    document.body.appendChild(container);

    function render(s){
      container.innerHTML='';

      // Selectors row
      var selRow=document.createElement('div');
      selRow.className='wp-mat-selectors';

      // m selector
      var mLabel=document.createElement('span');
      mLabel.className='wp-mat-sel-label';
      mLabel.textContent='m =';
      selRow.appendChild(mLabel);
      for(var m=1;m<=6;m++){
        var mp=document.createElement('span');
        mp.className='wp-pill'+(m===s.selM?' wp-pill-sel':'');
        mp.textContent=m;
        (function(mm){mp.onclick=function(){channel.postMessage({type:'set-m',m:mm})}})(m);
        selRow.appendChild(mp);
      }

      // spacer
      var spacer=document.createElement('span');
      spacer.style.width='20px';
      selRow.appendChild(spacer);

      // k selector
      var kLabel=document.createElement('span');
      kLabel.className='wp-mat-sel-label';
      kLabel.textContent='k =';
      selRow.appendChild(kLabel);
      for(var k=0;k<=s.selM;k++){
        var kp=document.createElement('span');
        kp.className='wp-pill'+(k===s.selK?' wp-pill-k-sel':'');
        kp.textContent=k;
        (function(kk){kp.onclick=function(){channel.postMessage({type:'set-k',k:kk})}})(k);
        selRow.appendChild(kp);
      }
      container.appendChild(selRow);

      // Grid
      var gridWrap=document.createElement('div');
      gridWrap.className='wp-grid-wrap';
      var table=document.createElement('table');
      table.className='wp-grid';

      // Header
      var hrow=document.createElement('tr');
      hrow.appendChild(document.createElement('th')); // corner
      for(var c=0;c<NNODE;c++){
        var th=document.createElement('th');
        th.textContent=(c+1);
        hrow.appendChild(th);
      }
      table.appendChild(hrow);

      for(var u=0;u<NNODE;u++){
        var tr=document.createElement('tr');
        var rh=document.createElement('th');
        rh.textContent=(u+1);
        tr.appendChild(rh);
        for(var v=0;v<NNODE;v++){
          var td=document.createElement('td');
          var cell=document.createElement('div');
          cell.className='wp-cell';
          var val=s.mat[u][v];
          cell.textContent=val;
          if(val===0) cell.classList.add('wp-cell-zero');
          if(u===s.cellU&&v===s.cellV) cell.classList.add('wp-cell-active');
          (function(uu,vv){cell.onclick=function(){channel.postMessage({type:'click-cell',u:uu,v:vv})}})(u,v);
          td.appendChild(cell);
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }
      gridWrap.appendChild(table);
      container.appendChild(gridWrap);
    }

    channel.onmessage=function(e){
      if(e.data.type==='state') render(e.data);
    };
    channel.postMessage({type:'request-state'});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',setupMatrix);
  else setupMatrix();
  return;
}

// ═══════════════════════════════════════════════════
// WALKS PIECE
// ═══════════════════════════════════════════════════
if (piece === 'walks') {
  function setupWalks(){
    var container=document.createElement('div');
    container.className='wp-walks';
    document.body.appendChild(container);

    function render(s){
      container.innerHTML='';

      var title=document.createElement('div');
      title.className='wp-walks-title';
      if(s.cellU<0||s.cellV<0){
        title.textContent='Click a cell in the matrix';
      } else {
        title.textContent='Walks: '+(s.cellU+1)+' \u2192 '+(s.cellV+1);
      }
      container.appendChild(title);

      var sub=document.createElement('div');
      sub.className='wp-walks-subtitle';
      if(s.cellU>=0&&s.cellV>=0){
        var count=s.mat[s.cellU][s.cellV];
        sub.textContent='m = '+s.selM+', k = '+s.selK+' forward edges \u2014 '+count+' walk'+(count!==1?'s':'');
      } else {
        sub.textContent='m = '+s.selM+', k = '+s.selK+' forward edges';
      }
      container.appendChild(sub);

      var list=document.createElement('div');
      list.className='wp-walks-list';

      if(!s.walks||s.walks.length===0){
        if(s.cellU>=0){
          var empty=document.createElement('div');
          empty.className='wp-walks-empty';
          empty.textContent='No walks found';
          list.appendChild(empty);
        }
      } else {
        for(var w=0;w<s.walks.length;w++){
          var walk=s.walks[w];
          var item=document.createElement('div');
          item.className='wp-walk-item';
          if(w===s.hovWalk) item.classList.add('wp-walk-item-active');

          for(var step=0;step<walk.path.length;step++){
            // Node circle
            var nd=document.createElement('span');
            nd.className='wp-walk-node';
            if(step===0) nd.classList.add('wp-walk-node-src');
            if(step===walk.path.length-1) nd.classList.add('wp-walk-node-tgt');
            nd.textContent=(walk.path[step]+1);
            item.appendChild(nd);

            // Arrow (if not last)
            if(step<walk.arrows.length){
              var arr=document.createElement('span');
              arr.className='wp-walk-arrow';
              if(walk.arrows[step]){
                arr.classList.add('wp-walk-fwd-arrow');
                arr.textContent='\u2192';
              } else {
                arr.classList.add('wp-walk-bwd-arrow');
                arr.textContent='\u2190';
              }
              item.appendChild(arr);
            }
          }

          (function(idx){
            item.onmouseenter=function(){channel.postMessage({type:'hover-walk',idx:idx})};
            item.onmouseleave=function(){channel.postMessage({type:'hover-walk',idx:-1})};
          })(w);
          list.appendChild(item);
        }
        if(s.walks.length>=200){
          var more=document.createElement('div');
          more.className='wp-walks-empty';
          more.textContent='(showing first 200 walks)';
          list.appendChild(more);
        }
      }
      container.appendChild(list);
    }

    channel.onmessage=function(e){
      if(e.data.type==='state') render(e.data);
    };
    channel.postMessage({type:'request-state'});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',setupWalks);
  else setupWalks();
  return;
}

// ═══════════════════════════════════════════════════
// STANDALONE
// ═══════════════════════════════════════════════════
function setupStandalone(){
  var magPow=precompute();
  var state={src:0,tgt:3,selM:3,selK:0,cellU:-1,cellV:-1,hovWalk:-1};

  var app=document.createElement('div');
  app.className='wp-standalone';

  // Graph
  var graphDiv=document.createElement('div');
  graphDiv.className='wp-standalone-graph';
  var svg=svgEl('svg',{viewBox:'0 0 420 310'});
  svg.classList.add('wp-graph-svg');
  graphDiv.appendChild(svg);

  // Matrix
  var matDiv=document.createElement('div');
  matDiv.className='wp-standalone-matrix';
  var matInner=document.createElement('div');
  matInner.className='wp-mat';
  matDiv.appendChild(matInner);

  // Walks
  var walksDiv=document.createElement('div');
  walksDiv.className='wp-standalone-walks';
  var walksInner=document.createElement('div');
  walksInner.className='wp-walks';
  walksDiv.appendChild(walksInner);

  app.appendChild(graphDiv);
  app.appendChild(matDiv);
  app.appendChild(walksDiv);
  document.body.appendChild(app);

  function refresh(){
    var mat=getMatrix(state.selM,state.selK,magPow);
    var walks=null;
    if(state.cellU>=0&&state.cellV>=0){
      walks=enumerateWalks(state.cellU,state.cellV,state.selM,state.selK);
    }
    var s={src:state.src,tgt:state.tgt,selM:state.selM,selK:state.selK,
      cellU:state.cellU,cellV:state.cellV,mat:mat,walks:walks,hovWalk:state.hovWalk,
      N:NNODE,edges:edges,pos:pos};

    renderGraph(svg,s,function(i){state.src=i;state.cellU=-1;state.cellV=-1;state.hovWalk=-1;refresh()});

    // Render matrix
    renderMatrix(matInner,s);
    // Render walks
    renderWalks(walksInner,s);
  }

  function renderMatrix(container,s){
    container.innerHTML='';
    var selRow=document.createElement('div');
    selRow.className='wp-mat-selectors';
    var mLabel=document.createElement('span');mLabel.className='wp-mat-sel-label';mLabel.textContent='m =';
    selRow.appendChild(mLabel);
    for(var m=1;m<=6;m++){
      var mp=document.createElement('span');mp.className='wp-pill'+(m===s.selM?' wp-pill-sel':'');
      mp.textContent=m;
      (function(mm){mp.onclick=function(){state.selM=mm;if(state.selK>mm)state.selK=mm;state.cellU=-1;state.cellV=-1;state.hovWalk=-1;refresh()}})(m);
      selRow.appendChild(mp);
    }
    selRow.appendChild(Object.assign(document.createElement('span'),{style:'width:20px'}));
    var kLabel=document.createElement('span');kLabel.className='wp-mat-sel-label';kLabel.textContent='k =';
    selRow.appendChild(kLabel);
    for(var k=0;k<=s.selM;k++){
      var kp=document.createElement('span');kp.className='wp-pill'+(k===s.selK?' wp-pill-k-sel':'');
      kp.textContent=k;
      (function(kk){kp.onclick=function(){state.selK=kk;state.cellU=-1;state.cellV=-1;state.hovWalk=-1;refresh()}})(k);
      selRow.appendChild(kp);
    }
    container.appendChild(selRow);

    var gridWrap=document.createElement('div');gridWrap.className='wp-grid-wrap';
    var table=document.createElement('table');table.className='wp-grid';
    var hrow=document.createElement('tr');hrow.appendChild(document.createElement('th'));
    for(var c=0;c<NNODE;c++){var th=document.createElement('th');th.textContent=(c+1);hrow.appendChild(th)}
    table.appendChild(hrow);
    for(var u=0;u<NNODE;u++){
      var tr=document.createElement('tr');
      var rh=document.createElement('th');rh.textContent=(u+1);tr.appendChild(rh);
      for(var v=0;v<NNODE;v++){
        var td=document.createElement('td');
        var cell=document.createElement('div');cell.className='wp-cell';
        var val=s.mat[u][v];cell.textContent=val;
        if(val===0)cell.classList.add('wp-cell-zero');
        if(u===s.cellU&&v===s.cellV)cell.classList.add('wp-cell-active');
        (function(uu,vv){cell.onclick=function(){state.cellU=uu;state.cellV=vv;state.hovWalk=-1;refresh()}})(u,v);
        td.appendChild(cell);tr.appendChild(td);
      }
      table.appendChild(tr);
    }
    gridWrap.appendChild(table);container.appendChild(gridWrap);
  }

  function renderWalks(container,s){
    container.innerHTML='';
    var title=document.createElement('div');title.className='wp-walks-title';
    title.textContent=s.cellU<0?'Click a cell':'Walks: '+(s.cellU+1)+' \u2192 '+(s.cellV+1);
    container.appendChild(title);
    var sub=document.createElement('div');sub.className='wp-walks-subtitle';
    if(s.cellU>=0){
      var cnt=s.mat[s.cellU][s.cellV];
      sub.textContent='m='+s.selM+', k='+s.selK+' fwd \u2014 '+cnt+' walk'+(cnt!==1?'s':'');
    } else sub.textContent='m='+s.selM+', k='+s.selK+' forward edges';
    container.appendChild(sub);

    var list=document.createElement('div');list.className='wp-walks-list';
    if(!s.walks||s.walks.length===0){
      if(s.cellU>=0){var e=document.createElement('div');e.className='wp-walks-empty';e.textContent='No walks';list.appendChild(e)}
    } else {
      for(var w=0;w<s.walks.length;w++){
        var walk=s.walks[w];
        var item=document.createElement('div');item.className='wp-walk-item';
        if(w===s.hovWalk)item.classList.add('wp-walk-item-active');
        for(var step=0;step<walk.path.length;step++){
          var nd=document.createElement('span');nd.className='wp-walk-node';
          if(step===0)nd.classList.add('wp-walk-node-src');
          if(step===walk.path.length-1)nd.classList.add('wp-walk-node-tgt');
          nd.textContent=(walk.path[step]+1);item.appendChild(nd);
          if(step<walk.arrows.length){
            var arr=document.createElement('span');arr.className='wp-walk-arrow';
            if(walk.arrows[step]){arr.classList.add('wp-walk-fwd-arrow');arr.textContent='\u2192'}
            else{arr.classList.add('wp-walk-bwd-arrow');arr.textContent='\u2190'}
            item.appendChild(arr);
          }
        }
        (function(idx){
          item.onmouseenter=function(){state.hovWalk=idx;refresh()};
          item.onmouseleave=function(){state.hovWalk=-1;refresh()};
        })(w);
        list.appendChild(item);
      }
    }
    container.appendChild(list);
  }

  refresh();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',setupStandalone);
else setupStandalone();

})();
</script>
