<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e8e8; font-family: system-ui; padding: 20px; }

.canvas-container {
  width: 800px;
  height: 500px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
  background: #ccc;
}

.canvas {
  width: 1920px;
  height: 1080px;
  background: #fff;
  position: relative;
  transform: scale(0.4);
  transform-origin: top center;
  border: 1px solid #999;
}

/* Simulates DraggableBox */
.element-box {
  position: absolute;
  left: 80px;
  top: 40px;
  width: 1760px;
  height: 200px;
  border: 2px solid transparent;
  cursor: grab;
}
.element-box:hover { border-color: #93c5fd; }

/* The text div inside */
.text-div {
  width: 100%;
  height: 100%;
  font-family: 'PT Sans', sans-serif;
  font-size: 72px;
  font-weight: 700;
  line-height: 1.3;
  padding: 8px 12px;
  outline: none;
  overflow: hidden;
  color: #222;
}

/* Test controls */
.controls {
  margin: 20px 0;
  display: flex;
  gap: 10px;
}
button { padding: 8px 16px; font-size: 14px; }
.info { font-size: 12px; color: #666; margin-top: 10px; }

/* Second element for comparison */
.element-box-2 {
  position: absolute;
  left: 80px;
  top: 300px;
  width: 1760px;
  height: 400px;
  border: 2px solid transparent;
  cursor: grab;
}
.element-box-2:hover { border-color: #86efac; }

.text-div-2 {
  width: 100%;
  height: 100%;
  font-family: 'PT Sans', sans-serif;
  font-size: 48px;
  line-height: 1.3;
  padding: 8px 12px;
  outline: none;
  overflow: hidden;
  color: #222;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<h3>ContentEditable Layout Shift Test</h3>
<p>Double-click any text box to edit. Watch for pixel shifts.</p>

<div class="controls">
  <button onclick="test1toggle()">Test 1: Toggle contentEditable</button>
  <button onclick="test2toggle()">Test 2: Always contentEditable + beforeinput</button>
  <button onclick="test3toggle()">Test 3: Toggle + dangerouslySetInnerHTML sim</button>
</div>

<div class="canvas-container">
  <div class="canvas">
    <!-- Test 1: Simple toggle (like MinimalText) -->
    <div class="element-box">
      <div id="t1" class="text-div"
        ondblclick="test1toggle()">
        Title: double-click to edit
      </div>
    </div>

    <!-- Test 2: Body text -->
    <div class="element-box-2">
      <div id="t2" class="text-div-2"
        ondblclick="test2toggle()">
        Body text: this is a longer piece of text to see if the shift happens with different font sizes and multiple lines of content.
      </div>
    </div>
  </div>
</div>

<div class="info" id="info"></div>

<script>
let t1editing = false;
let t2editing = false;

function logBounds(id) {
  const el = document.getElementById(id);
  const r = el.getBoundingClientRect();
  document.getElementById('info').textContent =
    `${id}: ${r.x.toFixed(2)}, ${r.y.toFixed(2)}, ${r.width.toFixed(2)}x${r.height.toFixed(2)}`;
}

// Test 1: Simple toggle
function test1toggle() {
  const el = document.getElementById('t1');
  t1editing = !t1editing;
  el.contentEditable = t1editing;
  if (t1editing) {
    el.focus();
    el.style.cursor = 'text';
  } else {
    el.style.cursor = 'inherit';
  }
  logBounds('t1');
}

// Test 2: Always contentEditable + beforeinput block
const t2el = document.getElementById('t2');
t2el.contentEditable = 'true';
t2el.addEventListener('beforeinput', (e) => {
  if (!t2editing) e.preventDefault();
});
function test2toggle() {
  t2editing = !t2editing;
  const el = t2el;
  if (t2editing) {
    el.focus();
    el.style.cursor = 'text';
    el.style.caretColor = 'auto';
  } else {
    el.style.cursor = 'inherit';
    el.style.caretColor = 'transparent';
  }
  logBounds('t2');
}

// Test 3: Toggle + innerHTML replacement (simulates React re-render)
function test3toggle() {
  const el = document.getElementById('t1');
  const html = el.innerHTML;
  t1editing = !t1editing;
  el.contentEditable = t1editing;
  el.innerHTML = html; // re-set same content
  if (t1editing) {
    el.focus();
    const sel = window.getSelection();
    sel.selectAllChildren(el);
    sel.collapseToEnd();
  }
  logBounds('t1');
}
</script>
</body>
</html>
