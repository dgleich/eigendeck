<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Directed Network Datasets</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#fff;
  font-family:'PT Sans',Arial,sans-serif; }

.dt-wrap { width:100%; height:100%; overflow-y:auto; padding:10px 16px;
  display:flex; gap:24px; font-family:'PT Sans Narrow','PT Sans',Arial,sans-serif; }
.dt-col { flex:1; min-width:0; }
.dt-table { border-collapse:collapse; width:100%; }
.dt-table th { font-size:44px; font-weight:400; color:#334155; text-align:left;
  padding:8px 14px; border-bottom:2px solid #334155; white-space:nowrap; }
.dt-table th.dt-num { text-align:right; }
.dt-table td { font-size:44px; color:#334155; padding:7px 14px;
  border-bottom:1px solid #e5e7eb; vertical-align:middle; }
.dt-table td.dt-num { text-align:right; font-variant-numeric:tabular-nums; }
.dt-table td.dt-cat { color:#475569; font-size:38px; }
.dt-table td.dt-name { }
.dt-table tr:hover { background:#f5f3ff; }
.dt-table tr.dt-highlight { background:#ede9fe; }
.dt-table tr.dt-cat-row td { border-top:2px solid #cbd5e1; }
</style>
</head>
<body>
<script>
(function() {
'use strict';

var params = new URLSearchParams(location.hash.slice(1));
var role = params.get('role');
var piece = params.get('piece');
var channelName = 'eigendeck-demo:' + location.pathname.split('/').pop();
var channel = new BroadcastChannel(channelName);

// ─── Dataset table data ─────────────────────────────
var DATASETS = [
  {cat:'Biological', name:'Celegans', ref:'1', desc:'A metabolic network of Caenorhabditis elegans (C. elegans).', n:453, e:4596},
  {cat:'', name:'Figeys', ref:'2', desc:'A protein-protein interaction network in Homo sapiens.', n:2239, e:6452},
  {cat:'', name:'Drug-drug', ref:'3', desc:'A network of FDA-approved drugs.', n:1514, e:48514},
  {cat:'', name:'Drug-target', ref:'4', desc:'A drug-target interaction network linking drugs to their protein targets.', n:3932, e:18690},
  {cat:'', name:'Bio-functions', ref:'5', desc:'A hierarchical network of biological functions defined by Gene Ontology.', n:46027, e:106510},
  {cat:'', name:'Protein-protein', ref:'6', desc:'A protein-protein interaction network of physical interactions in cells.', n:21557, e:342353},
  {cat:'Citation', name:'Cora-ML', ref:'7', desc:'A citation network of papers.', n:2995, e:8416},
  {cat:'', name:'Citeseer', ref:'8', desc:'A citation data set from an automatic citation indexing system.', n:3312, e:4715},
  {cat:'', name:'Ogbn-arxiv', ref:'9', desc:'A citation network of Computer Science arXiv papers indexed by MAG.', n:169343, e:1166243},
  {cat:'', name:'Arxiv-HEP-TH', ref:'10', desc:'A citation network of high-energy physics theory papers from arXiv.', n:27770, e:352807},
  {cat:'Social', name:'Adolescent health', ref:'11', desc:'A friendship network with top five male and female friends.', n:2539, e:12969},
  {cat:'', name:'High-school', ref:'12', desc:'A friendship network between boys in a high-school in Illinois.', n:70, e:366},
  {cat:'', name:'Epinions', ref:'13', desc:'A directed trust network from Epinions.com.', n:75879, e:508837},
  {cat:'', name:'Wiki-vote', ref:'14', desc:'A voting network from Wikipedia administrator.', n:7115, e:103689},
  {cat:'Program', name:'Ogbg-code2 (9k)', ref:'9', desc:'Abstract syntax trees obtained from Python method definitions.', n:9048, e:9147},
  {cat:'', name:'Ogbg-code2 (20k)', ref:'9', desc:'', n:20141, e:20140},
  {cat:'', name:'Ogbg-code2 (36k)', ref:'9', desc:'', n:36123, e:36122},
  {cat:'Information', name:'Political blogs', ref:'15', desc:'A directed network of hyperlinks between political weblogs.', n:1224, e:19025},
  {cat:'', name:'Email', ref:'16', desc:'An email network among employees at a European research institution.', n:1005, e:25571},
  {cat:'Transport', name:'Air traffic control', ref:'17', desc:"A flight network from the U.S. FAA's National Flight Data Center.", n:1226, e:2615},
  {cat:'', name:'USA airports', ref:'18', desc:'A directed network of flight routes between U.S. airports.', n:1574, e:28236},
  {cat:'Computational\ngraphs', name:'AlexNet', ref:'19', desc:'', n:372, e:597},
  {cat:'', name:'ResNet', ref:'19', desc:'', n:5605, e:9018},
  {cat:'', name:'Mask-RCNN', ref:'19', desc:'Tensor Computational Graphs of neural architectures.', n:14680, e:23604},
  {cat:'', name:'Transformer', ref:'19', desc:'', n:13342, e:21709},
  {cat:'', name:'Bert', ref:'19', desc:'', n:21338, e:37243},
];

function fmtNum(n) {
  return n.toLocaleString();
}

function buildColumn(datasets, startIdx) {
  var table = document.createElement('table');
  table.className = 'dt-table';

  var thead = document.createElement('thead');
  var hrow = document.createElement('tr');
  ['Category', 'Name', 'N', 'E'].forEach(function(h, i) {
    var th = document.createElement('th');
    th.textContent = h;
    if (i >= 2) th.className = 'dt-num';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  var prevCat = '';
  datasets.forEach(function(d, idx) {
    var tr = document.createElement('tr');
    var isNewCat = d.cat && d.cat !== prevCat;
    if (isNewCat) {
      tr.className = 'dt-cat-row';
      prevCat = d.cat;
    }

    var tdCat = document.createElement('td');
    tdCat.className = 'dt-cat';
    if (isNewCat) {
      tdCat.textContent = d.cat.replace('\n', ' ');
      var span = 1;
      for (var j = idx + 1; j < datasets.length && !datasets[j].cat; j++) span++;
      tdCat.rowSpan = span;
    }
    if (isNewCat || idx === 0) tr.appendChild(tdCat);

    var tdName = document.createElement('td');
    tdName.className = 'dt-name';
    tdName.textContent = d.name;
    tr.appendChild(tdName);

    var tdN = document.createElement('td');
    tdN.className = 'dt-num';
    tdN.textContent = fmtNum(d.n);
    tr.appendChild(tdN);

    var tdE = document.createElement('td');
    tdE.className = 'dt-num';
    tdE.textContent = fmtNum(d.e);
    tr.appendChild(tdE);

    tr.style.cursor = 'pointer';
    tr.addEventListener('click', function() {
      // Clear all highlights across both columns
      document.querySelectorAll('.dt-table tr').forEach(function(r) { r.classList.remove('dt-highlight'); });
      tr.classList.add('dt-highlight');
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  return table;
}

function buildTable(container) {
  container.innerHTML = '';
  var wrap = document.createElement('div');
  wrap.className = 'dt-wrap';

  // Split datasets into two halves, breaking at a category boundary
  var splitIdx = Math.ceil(DATASETS.length / 2);
  // Adjust to not split mid-category
  while (splitIdx < DATASETS.length && !DATASETS[splitIdx].cat) splitIdx++;

  var col1 = document.createElement('div');
  col1.className = 'dt-col';
  col1.appendChild(buildColumn(DATASETS.slice(0, splitIdx), 0));

  var col2 = document.createElement('div');
  col2.className = 'dt-col';
  col2.appendChild(buildColumn(DATASETS.slice(splitIdx), splitIdx));

  wrap.appendChild(col1);
  wrap.appendChild(col2);
  container.appendChild(wrap);
}

// ═══════════════════════════════════════════════════
// CONTROLLER
// ═══════════════════════════════════════════════════
if (role === 'controller') {
  if (document.body) document.body.style.display = 'none';
  else document.addEventListener('DOMContentLoaded', function() { document.body.style.display = 'none'; });
  channel.onmessage = function(e) {
    if (e.data.type === 'request-state') channel.postMessage({type:'state'});
  };
  channel.postMessage({type:'state'});
  return;
}

// ═══════════════════════════════════════════════════
// TABLE PIECE / STANDALONE
// ═══════════════════════════════════════════════════
function setup() {
  buildTable(document.body);
  channel.onmessage = function(e) {};
  channel.postMessage({type:'request-state'});
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setup);
else setup();

})();
</script>
</body>
</html>
