<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Directed Graph Spectral Layouts</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#fff;
  font-family:'PT Sans',Arial,sans-serif; }

/* ── Graph piece ─────────────────────────────────── */
.dl-graph { width:100%; height:100%; position:relative; }
.dl-graph svg { width:100%; height:100%; display:block; }
.dl-edge { stroke:#b0b8c4; stroke-width:1.2; fill:none; opacity:0.5; }
.dl-edge-marker { fill:#b0b8c4; }
.dl-node { stroke:#fff; stroke-width:1.5; cursor:pointer; }
.dl-node:hover { stroke:#1e40af; stroke-width:2.5; }
.dl-node-label { font-size:14px; fill:#334155; text-anchor:middle;
  dominant-baseline:central; pointer-events:none; font-weight:600; }
.dl-hover-label { font-size:18px; fill:#1e293b; text-anchor:middle; font-weight:700;
  pointer-events:none; paint-order:stroke; stroke:#fff; stroke-width:4px;
  stroke-linejoin:round; }
.dl-ctrl-cb { display:flex; align-items:center; gap:8px; margin-top:4px; }
.dl-ctrl-cb label { font-size:22px; color:#334155; cursor:pointer;
  display:flex; align-items:center; gap:8px; user-select:none; }
.dl-ctrl-cb input[type=checkbox] { width:20px; height:20px; accent-color:#4f46e5; }

/* ── Controls piece ──────────────────────────────── */
.dl-controls { width:100%; height:100%; display:flex; flex-direction:column;
  gap:16px; padding:14px 18px; overflow-y:auto; }
.dl-ctrl-section { display:flex; flex-direction:column; gap:8px; }
.dl-ctrl-label { font-size:26px; font-weight:700; color:#334155; }
.dl-ctrl-sublabel { font-size:20px; color:#64748b; }
.dl-ctrl-select { font-size:24px; font-family:inherit; padding:8px 12px;
  border:2px solid #cbd5e1; border-radius:8px; background:#fff; color:#334155;
  cursor:pointer; }
.dl-layout-grid { display:flex; flex-wrap:wrap; gap:8px; }
.dl-layout-btn { padding:8px 16px; font-size:22px; font-weight:600;
  font-family:inherit; border:2.5px solid #cbd5e1; border-radius:8px;
  background:#fff; color:#475569; cursor:pointer; transition:all .15s;
  user-select:none; white-space:nowrap; }
.dl-layout-btn:hover { border-color:#6366f1; background:#f5f3ff; }
.dl-layout-btn-active { border-color:#4f46e5; background:#4f46e5; color:#fff; }
.dl-q-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.dl-q-pill { display:inline-flex; align-items:center; justify-content:center;
  min-width:42px; height:42px; padding:0 8px; border-radius:50%;
  border:2.5px solid #cbd5e1; background:#fff; font-size:20px; font-weight:700;
  color:#64748b; cursor:pointer; transition:all .15s; user-select:none; }
.dl-q-pill:hover { border-color:#94a3b8; background:#f1f5f9; }
.dl-q-pill-sel { background:#0891b2; border-color:#0891b2; color:#fff; }
.dl-info { font-size:20px; color:#64748b; line-height:1.4; }

/* ── Standalone ──────────────────────────────────── */
.dl-standalone { display:flex; height:100%; padding:10px; gap:14px; }
.dl-standalone-graph { flex:1; }
.dl-standalone-controls { flex:0 0 380px; overflow-y:auto; }
</style>
<script src="https://d3js.org/d3.v7.min.js"></script>

// ─── Force layout computation ───────────────────────
function computeForceLayout(graphData, cb) {
  var nodes = graphData.nodes.map(function(n, i) {
    return {index: i, x: VIEW_W/2 + (Math.random()-0.5)*200, y: VIEW_H/2 + (Math.random()-0.5)*200};
  });
  var links = graphData.edges.map(function(e) {
    return {source: e[0], target: e[1]};
  });
  var sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d){return d.index}).distance(30))
    .force('charge', d3.forceManyBody().strength(-50))
    .force('center', d3.forceCenter(VIEW_W/2, VIEW_H/2))
    .force('collide', d3.forceCollide(8))
    .stop();

  for (var i = 0; i < 300; i++) sim.tick();

  // Normalize to view
  var xs = nodes.map(function(n){return n.x});
  var ys = nodes.map(function(n){return n.y});
  var xmin = Math.min.apply(null, xs), xmax = Math.max.apply(null, xs);
  var ymin = Math.min.apply(null, ys), ymax = Math.max.apply(null, ys);
  var M = 60;
  if (xmax - xmin < 1) xmax = xmin + 1;
  if (ymax - ymin < 1) ymax = ymin + 1;
  var coords = nodes.map(function(n) {
    return [
      Math.round((M + (n.x - xmin) / (xmax - xmin) * (VIEW_W - 2*M)) * 10) / 10,
      Math.round((M + (n.y - ymin) / (ymax - ymin) * (VIEW_H - 2*M)) * 10) / 10
    ];
  });
  cb(coords);
}

if (role === 'controller') {
  if(document.body) document.body.style.display='none';
  else document.addEventListener('DOMContentLoaded',function(){document.body.style.display='none'});

  var state = {graphKey: null, layoutKey: 'force', magneticQ: 0.1, coords: null, showLabels: true};
  var forceCache = {};

  function broadcast() {
    if (!DATA || !state.graphKey) return;
    var g = DATA[state.graphKey];
    if (!g) return;

    var layoutActual = state.layoutKey;
    if (layoutActual === 'magnetic') layoutActual = 'magnetic_' + state.magneticQ.toFixed(2);

    var coords = null;
    if (layoutActual === 'force') {
      coords = forceCache[state.graphKey] || null;
    } else {
      coords = g.layouts[layoutActual] || null;
    }

    channel.postMessage({
      type: 'state',
      graphKey: state.graphKey,
      graphNames: Object.keys(DATA),
      nodes: g.nodes,
      edges: g.edges,
      n: g.n,
      description: g.description,
      layoutKey: state.layoutKey,
      magneticQ: state.magneticQ,
      coords: coords,
      availableLayouts: Object.keys(g.layouts),
      showLabels: state.showLabels
    });
  }

  loadData(function(data) {
    state.graphKey = data['fauci-email-graph'] ? 'fauci-email-graph' : Object.keys(data)[0];
    // Precompute force layout for first graph
    computeForceLayout(data[state.graphKey], function(c) {
      forceCache[state.graphKey] = c;
      broadcast();
    });
  });

  channel.onmessage = function(e) {
    var d = e.data;
    if (d.type === 'request-state') { broadcast(); return; }
    if (d.type === 'set-graph') {
      state.graphKey = d.key;
      state.layoutKey = 'force';
      if (!forceCache[d.key]) {
        computeForceLayout(DATA[d.key], function(c) {
          forceCache[d.key] = c;
          broadcast();
        });
      } else {
        broadcast();
      }
      return;
    }
    if (d.type === 'set-layout') {
      state.layoutKey = d.key;
      if (d.key === 'force' && !forceCache[state.graphKey]) {
        computeForceLayout(DATA[state.graphKey], function(c) {
          forceCache[state.graphKey] = c;
          broadcast();
        });
        return;
      }
      broadcast();
    }
    if (d.type === 'set-q') { state.magneticQ = d.q; broadcast(); }
    if (d.type === 'set-show-labels') { state.showLabels = d.value; broadcast(); }
  };
  return;
}

// GRAPH PIECE — D3 rendering with transitions
// ═══════════════════════════════════════════════════
if (piece === 'graph') {
  function setupGraph() {
    var container = document.createElement('div');
    container.className = 'dl-graph';
    document.body.appendChild(container);

    var svg = d3.select(container).append('svg')
      .attr('viewBox', '0 0 ' + VIEW_W + ' ' + VIEW_H)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    // Arrow marker
    svg.append('defs').append('marker')
      .attr('id', 'dl-arrow')
      .attr('viewBox', '0 0 10 10')
      .attr('refX', 18).attr('refY', 5)
      .attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path').attr('d', 'M0 0L10 5L0 10z').attr('class', 'dl-edge-marker');

    var edgeG = svg.append('g');
    var nodeG = svg.append('g');
    var labelG = svg.append('g');
    var hoverG = svg.append('g');

    var prevState = null;

    function render(s) {
      if (!s.coords) return;
      var isNewGraph = !prevState || prevState.graphKey !== s.graphKey;
      var dur = isNewGraph ? 0 : 600;

      // Edges
      var edgeSel = edgeG.selectAll('line.dl-edge').data(s.edges, function(d){return d[0]+'-'+d[1]});
      edgeSel.exit().remove();
      var edgeEnter = edgeSel.enter().append('line').attr('class', 'dl-edge')
        .attr('marker-end', 'url(#dl-arrow)');
      var edgeAll = edgeEnter.merge(edgeSel);
      edgeAll.transition().duration(dur)
        .attr('x1', function(d){return s.coords[d[0]][0]})
        .attr('y1', function(d){return s.coords[d[0]][1]})
        .attr('x2', function(d){return s.coords[d[1]][0]})
        .attr('y2', function(d){return s.coords[d[1]][1]});

      // Node radius based on graph size
      var r = s.n > 100 ? 4 : s.n > 40 ? 6 : 8;

      // Color scale
      var groups = {};
      s.nodes.forEach(function(n) { if (n.group) groups[n.group] = true; });
      var groupList = Object.keys(groups);
      var color = d3.scaleOrdinal(d3.schemeTableau10);

      // Nodes
      var nodeSel = nodeG.selectAll('circle.dl-node').data(s.nodes, function(d){return d.id});
      nodeSel.exit().remove();
      var nodeEnter = nodeSel.enter().append('circle').attr('class', 'dl-node').attr('r', r);
      var nodeAll = nodeEnter.merge(nodeSel);
      nodeAll.attr('r', r)
        .attr('fill', function(d, i) { return d.group ? color(d.group) : '#6366f1'; })
        .on('mouseenter', function(ev, d) {
          var i = s.nodes.indexOf(d);
          hoverG.selectAll('*').remove();
          hoverG.append('text').attr('class', 'dl-hover-label')
            .attr('x', s.coords[i][0]).attr('y', s.coords[i][1] - r - 6)
            .text(d.label || d.id);
        })
        .on('mouseleave', function() { hoverG.selectAll('*').remove(); })
        .transition().duration(dur)
        .attr('cx', function(d, i){return s.coords[i][0]})
        .attr('cy', function(d, i){return s.coords[i][1]});

      // Labels (conditional)
      if (s.showLabels && s.n <= 60) {
        var lblSel = labelG.selectAll('text.dl-node-label').data(s.nodes, function(d){return d.id});
        lblSel.exit().remove();
        var lblEnter = lblSel.enter().append('text').attr('class', 'dl-node-label');
        var lblAll = lblEnter.merge(lblSel);
        lblAll.text(function(d) { return d.label || d.id; })
          .attr('font-size', s.n <= 20 ? '16px' : '12px')
          .transition().duration(dur)
          .attr('x', function(d, i){return s.coords[i][0]})
          .attr('y', function(d, i){return s.coords[i][1] - r - 4});
      } else {
        labelG.selectAll('text').remove();
      }

      prevState = s;
    }

    channel.onmessage = function(e) {
      if (e.data.type === 'state') render(e.data);
    };
    channel.postMessage({type: 'request-state'});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupGraph);
  else setupGraph();
  return;
}

if (piece === 'controls') {
  function setupControls() {
    var container = document.createElement('div');
    container.className = 'dl-controls';
    document.body.appendChild(container);

    function render(s) {
      container.innerHTML = '';

      // Graph selector
      var graphSec = document.createElement('div');
      graphSec.className = 'dl-ctrl-section';
      var graphLabel = document.createElement('div');
      graphLabel.className = 'dl-ctrl-label';
      graphLabel.textContent = 'Graph';
      graphSec.appendChild(graphLabel);

      var sel = document.createElement('select');
      sel.className = 'dl-ctrl-select';
      (s.graphNames || []).forEach(function(name) {
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name.replace(/-/g, ' ');
        if (name === s.graphKey) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onchange = function() { channel.postMessage({type:'set-graph', key:sel.value}); };
      graphSec.appendChild(sel);

      if (s.description) {
        var desc = document.createElement('div');
        desc.className = 'dl-info';
        desc.textContent = s.description;
        graphSec.appendChild(desc);
      }
      container.appendChild(graphSec);

      // Layout selector
      var layoutSec = document.createElement('div');
      layoutSec.className = 'dl-ctrl-section';
      var layoutLabel = document.createElement('div');
      layoutLabel.className = 'dl-ctrl-label';
      layoutLabel.textContent = 'Layout method';
      layoutSec.appendChild(layoutLabel);

      var grid = document.createElement('div');
      grid.className = 'dl-layout-grid';
      var available = s.availableLayouts || [];

      LAYOUT_GROUPS.forEach(function(lg) {
        // Check if this layout is available (force is always available)
        if (lg.key !== 'force' && lg.key !== 'magnetic') {
          if (available.indexOf(lg.key) < 0) return;
        }
        if (lg.key === 'magnetic') {
          // Check if any magnetic layout exists
          var hasMag = available.some(function(k) { return k.indexOf('magnetic_') === 0; });
          if (!hasMag) return;
        }

        var btn = document.createElement('button');
        btn.className = 'dl-layout-btn';
        if (s.layoutKey === lg.key) btn.classList.add('dl-layout-btn-active');
        btn.textContent = lg.label;
        btn.title = lg.desc;
        btn.onclick = function() { channel.postMessage({type:'set-layout', key:lg.key}); };
        grid.appendChild(btn);
      });
      layoutSec.appendChild(grid);

      // Description of current layout
      var curLayout = LAYOUT_GROUPS.find(function(lg) { return lg.key === s.layoutKey; });
      if (curLayout) {
        var ldesc = document.createElement('div');
        ldesc.className = 'dl-ctrl-sublabel';
        ldesc.textContent = curLayout.desc;
        layoutSec.appendChild(ldesc);
      }

      container.appendChild(layoutSec);

      // Magnetic q selector
      if (s.layoutKey === 'magnetic') {
        var qSec = document.createElement('div');
        qSec.className = 'dl-ctrl-section';
        var qLabel = document.createElement('div');
        qLabel.className = 'dl-ctrl-label';
        qLabel.textContent = 'q (magnetic strength)';
        qSec.appendChild(qLabel);

        var qRow = document.createElement('div');
        qRow.className = 'dl-q-row';
        Q_VALUES.forEach(function(q) {
          var pill = document.createElement('span');
          pill.className = 'dl-q-pill';
          if (Math.abs(q - s.magneticQ) < 0.001) pill.classList.add('dl-q-pill-sel');
          pill.textContent = q.toFixed(2);
          pill.onclick = function() { channel.postMessage({type:'set-q', q:q}); };
          qRow.appendChild(pill);
        });
        qSec.appendChild(qRow);
        container.appendChild(qSec);
      }

      // Show labels checkbox
      var cbSec = document.createElement('div');
      cbSec.className = 'dl-ctrl-section';
      var cbRow = document.createElement('div');
      cbRow.className = 'dl-ctrl-cb';
      var cbLabel = document.createElement('label');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = s.showLabels;
      cbLabel.appendChild(cb);
      cbLabel.appendChild(document.createTextNode(' Show node labels'));
      cb.onchange = function() { channel.postMessage({type:'set-show-labels', value:cb.checked}); };
      cbRow.appendChild(cbLabel);
      cbSec.appendChild(cbRow);
      container.appendChild(cbSec);
    }

    channel.onmessage = function(e) {
      if (e.data.type === 'state') render(e.data);
    };
    channel.postMessage({type:'request-state'});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupControls);
  else setupControls();
  return;
}

// ═══════════════════════════════════════════════════
// STANDALONE
// ═══════════════════════════════════════════════════
function setupStandalone() {
  var app = document.createElement('div');
  app.className = 'dl-standalone';

  var graphDiv = document.createElement('div');
  graphDiv.className = 'dl-standalone-graph';
  var ctrlDiv = document.createElement('div');
  ctrlDiv.className = 'dl-standalone-controls';
  var ctrlInner = document.createElement('div');
  ctrlInner.className = 'dl-controls';
  ctrlDiv.appendChild(ctrlInner);

  app.appendChild(graphDiv);
  app.appendChild(ctrlDiv);
  document.body.appendChild(app);

  var svg = d3.select(graphDiv).append('svg')
    .attr('viewBox', '0 0 ' + VIEW_W + ' ' + VIEW_H)
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('width', '100%').style('height', '100%');

  svg.append('defs').append('marker')
    .attr('id', 'dl-arrow')
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 18).attr('refY', 5)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0 0L10 5L0 10z').attr('class', 'dl-edge-marker');

  var edgeG = svg.append('g');
  var nodeG = svg.append('g');
  var labelG = svg.append('g');
  var hoverG = svg.append('g');

  var state = {graphKey:null, layoutKey:'force', magneticQ:0.1, showLabels:true};
  var forceCache = {};
  var prevGraphKey = null;

  function getCoords(g) {
    var lk = state.layoutKey;
    if (lk === 'magnetic') lk = 'magnetic_' + state.magneticQ.toFixed(2);
    if (lk === 'force') return forceCache[state.graphKey] || null;
    return g.layouts[lk] || null;
  }

  function refresh() {
    if (!DATA || !state.graphKey) return;
    var g = DATA[state.graphKey];
    var coords = getCoords(g);
    if (!coords) return;
    var s = {graphKey:state.graphKey, nodes:g.nodes, edges:g.edges, n:g.n,
      coords:coords, layoutKey:state.layoutKey, magneticQ:state.magneticQ,
      graphNames:Object.keys(DATA), description:g.description,
      availableLayouts:Object.keys(g.layouts), showLabels:state.showLabels};

    var isNew = prevGraphKey !== s.graphKey;
    var dur = isNew ? 0 : 600;
    prevGraphKey = s.graphKey;

    // Render graph
    var edgeSel = edgeG.selectAll('line.dl-edge').data(s.edges, function(d){return d[0]+'-'+d[1]});
    edgeSel.exit().remove();
    var edgeEnter = edgeSel.enter().append('line').attr('class','dl-edge').attr('marker-end','url(#dl-arrow)');
    edgeEnter.merge(edgeSel).transition().duration(dur)
      .attr('x1',function(d){return s.coords[d[0]][0]}).attr('y1',function(d){return s.coords[d[0]][1]})
      .attr('x2',function(d){return s.coords[d[1]][0]}).attr('y2',function(d){return s.coords[d[1]][1]});

    var r = s.n > 100 ? 4 : s.n > 40 ? 6 : 8;
    var color = d3.scaleOrdinal(d3.schemeTableau10);
    var nodeSel = nodeG.selectAll('circle.dl-node').data(s.nodes, function(d){return d.id});
    nodeSel.exit().remove();
    var nodeEnter = nodeSel.enter().append('circle').attr('class','dl-node').attr('r',r);
    nodeEnter.merge(nodeSel).attr('r',r)
      .attr('fill',function(d){return d.group?color(d.group):'#6366f1'})
      .on('mouseenter', function(ev, d) {
        var i = s.nodes.indexOf(d);
        hoverG.selectAll('*').remove();
        hoverG.append('text').attr('class','dl-hover-label')
          .attr('x', s.coords[i][0]).attr('y', s.coords[i][1] - r - 6)
          .text(d.label || d.id);
      })
      .on('mouseleave', function() { hoverG.selectAll('*').remove(); })
      .transition().duration(dur)
      .attr('cx',function(d,i){return s.coords[i][0]}).attr('cy',function(d,i){return s.coords[i][1]});

    if (s.showLabels && s.n <= 60) {
      var lblSel = labelG.selectAll('text.dl-node-label').data(s.nodes, function(d){return d.id});
      lblSel.exit().remove();
      var lblEnter = lblSel.enter().append('text').attr('class','dl-node-label');
      lblEnter.merge(lblSel).text(function(d){return d.label||d.id})
        .attr('font-size', s.n<=20?'16px':'12px')
        .transition().duration(dur)
        .attr('x',function(d,i){return s.coords[i][0]}).attr('y',function(d,i){return s.coords[i][1]-r-4});
    } else { labelG.selectAll('text').remove(); }

    // Render controls
    renderControls(ctrlInner, s);
  }

  function renderControls(container, s) {
    container.innerHTML = '';
    // Graph selector
    var gs = document.createElement('div'); gs.className='dl-ctrl-section';
    var gl = document.createElement('div'); gl.className='dl-ctrl-label'; gl.textContent='Graph'; gs.appendChild(gl);
    var sel = document.createElement('select'); sel.className='dl-ctrl-select';
    (s.graphNames||[]).forEach(function(name){
      var o=document.createElement('option'); o.value=name; o.textContent=name.replace(/-/g,' ');
      if(name===s.graphKey)o.selected=true; sel.appendChild(o);
    });
    sel.onchange=function(){
      state.graphKey=sel.value; state.layoutKey='force';
      if(!forceCache[sel.value]){
        computeForceLayout(DATA[sel.value],function(c){forceCache[sel.value]=c;refresh()});
      } else refresh();
    };
    gs.appendChild(sel);
    if(s.description){var dd=document.createElement('div');dd.className='dl-info';dd.textContent=s.description;gs.appendChild(dd)}
    container.appendChild(gs);

    // Layout buttons
    var ls=document.createElement('div');ls.className='dl-ctrl-section';
    var ll=document.createElement('div');ll.className='dl-ctrl-label';ll.textContent='Layout method';ls.appendChild(ll);
    var grid=document.createElement('div');grid.className='dl-layout-grid';
    var avail=s.availableLayouts||[];
    LAYOUT_GROUPS.forEach(function(lg){
      if(lg.key!=='force'&&lg.key!=='magnetic'&&avail.indexOf(lg.key)<0)return;
      if(lg.key==='magnetic'&&!avail.some(function(k){return k.indexOf('magnetic_')===0}))return;
      var btn=document.createElement('button');btn.className='dl-layout-btn';
      if(s.layoutKey===lg.key)btn.classList.add('dl-layout-btn-active');
      btn.textContent=lg.label;btn.title=lg.desc;
      btn.onclick=function(){state.layoutKey=lg.key;refresh()};
      grid.appendChild(btn);
    });
    ls.appendChild(grid);
    var cur=LAYOUT_GROUPS.find(function(lg){return lg.key===s.layoutKey});
    if(cur){var ld=document.createElement('div');ld.className='dl-ctrl-sublabel';ld.textContent=cur.desc;ls.appendChild(ld)}
    container.appendChild(ls);

    // Magnetic q
    if(s.layoutKey==='magnetic'){
      var qs=document.createElement('div');qs.className='dl-ctrl-section';
      var ql=document.createElement('div');ql.className='dl-ctrl-label';ql.textContent='q (magnetic strength)';qs.appendChild(ql);
      var qr=document.createElement('div');qr.className='dl-q-row';
      Q_VALUES.forEach(function(q){
        var p=document.createElement('span');p.className='dl-q-pill';
        if(Math.abs(q-s.magneticQ)<0.001)p.classList.add('dl-q-pill-sel');
        p.textContent=q.toFixed(2);
        p.onclick=function(){state.magneticQ=q;refresh()};
        qr.appendChild(p);
      });
      qs.appendChild(qr);container.appendChild(qs);
    }

    // Show labels checkbox
    var cbSec = document.createElement('div'); cbSec.className='dl-ctrl-section';
    var cbRow = document.createElement('div'); cbRow.className='dl-ctrl-cb';
    var cbLabel = document.createElement('label');
    var cb = document.createElement('input'); cb.type='checkbox'; cb.checked=s.showLabels;
    cbLabel.appendChild(cb);
    cbLabel.appendChild(document.createTextNode(' Show node labels'));
    cb.onchange=function(){state.showLabels=cb.checked;refresh()};
    cbRow.appendChild(cbLabel); cbSec.appendChild(cbRow); container.appendChild(cbSec);
  }

  loadData(function(data) {
    state.graphKey = data['fauci-email-graph'] ? 'fauci-email-graph' : Object.keys(data)[0];
    computeForceLayout(data[state.graphKey], function(c) {
      forceCache[state.graphKey] = c;
      refresh();
    });
  });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupStandalone);
else setupStandalone();

})();
</script>
</body>
</html>
