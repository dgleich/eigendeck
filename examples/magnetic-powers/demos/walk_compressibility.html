<html lang="en">
<head>
<meta charset="utf-8">
<title>Walk Profile Compressibility</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#fff;
  font-family:'PT Sans',Arial,sans-serif; }

/* ── Plot piece ──────────────────────────────────── */
.wc-plot { width:100%; height:100%; position:relative; }
.wc-plot canvas { width:100%; height:100%; display:block; }

/* ── Heatmap piece ───────────────────────────────── */
.wc-heatmap { width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; }
.wc-hm-title { font-size:26px; color:#334155; margin-bottom:8px; text-align:center; }
.wc-hm-canvas { image-rendering:pixelated; max-width:100%; max-height:90%; }

/* ── Controls piece ──────────────────────────────── */
.wc-controls { width:100%; height:100%; display:flex; flex-direction:column;
  gap:16px; padding:14px 18px; overflow-y:auto; }
.wc-ctrl-section { display:flex; flex-direction:column; gap:8px; }
.wc-ctrl-label { font-size:26px; font-weight:700; color:#334155; }
.wc-ctrl-sublabel { font-size:20px; color:#64748b; }
.wc-ctrl-select { font-size:24px; font-family:inherit; padding:8px 12px;
  border:2px solid #cbd5e1; border-radius:8px; background:#fff; color:#334155; cursor:pointer; }
.wc-ctrl-row { display:flex; align-items:center; gap:12px; }
.wc-ctrl-slider { flex:1; height:8px; accent-color:#6366f1; }
.wc-ctrl-val { font-size:24px; color:#6366f1; font-weight:600; min-width:60px; }
.wc-ctrl-info { font-size:22px; color:#64748b; line-height:1.3; }
.wc-computing { font-size:28px; color:#94a3b8; text-align:center; padding:40px; }

/* ── Standalone ──────────────────────────────────── */
.wc-standalone { display:flex; height:100%; padding:10px; gap:14px; }
.wc-standalone-left { flex:0 0 320px; display:flex; flex-direction:column; gap:10px; }
.wc-standalone-left > div:first-child { flex:0 0 auto; }
.wc-standalone-left > div:last-child { flex:1; }
.wc-standalone-right { flex:1; display:flex; align-items:center; justify-content:center; }

function matAbsSum(A, n) {

  for (var i = 0; i < nn; i++) s += Math.abs(A[i]);
  return s;
}

// ─── Small complex matrix ops (for Fourier system) ──
// Stored as {re: Float64Array, im: Float64Array} of size rows*cols
function cMatNew(r, c) { return {re: new Float64Array(r*c), im: new Float64Array(r*c), rows:r, cols:c}; }
function cMatHermMul(A, B) {
  // C = A^H * B, A is (ra x ca), B is (ra x cb), C is (ca x cb)
  var ra = A.rows, ca = A.cols, cb = B.cols;
  var C = cMatNew(ca, cb);
  for (var i = 0; i < ca; i++)
    for (var k = 0; k < ra; k++) {
      var ar = A.re[k*ca+i], ai = -A.im[k*ca+i]; // conjugate
      for (var j = 0; j < cb; j++) {
        var br = B.re[k*cb+j], bi = B.im[k*cb+j];
        C.re[i*cb+j] += ar*br - ai*bi;
        C.im[i*cb+j] += ar*bi + ai*br;
      }
    }
  return C;
}
function cMatMul(A, B) {
  var ra = A.rows, ca = A.cols, cb = B.cols;
  var C = cMatNew(ra, cb);
  for (var i = 0; i < ra; i++)
    for (var k = 0; k < ca; k++) {
      var ar = A.re[i*ca+k], ai = A.im[i*ca+k];
      if (ar === 0 && ai === 0) continue;
      for (var j = 0; j < cb; j++) {
        var br = B.re[k*cb+j], bi = B.im[k*cb+j];
        C.re[i*cb+j] += ar*br - ai*bi;
        C.im[i*cb+j] += ar*bi + ai*br;
      }
    }
  return C;
}

// Invert small complex matrix via Gauss-Jordan
function cMatInv(A) {
  var n = A.rows;
  // Augment [A | I]
  var re = new Float64Array(n * 2 * n);
  var im = new Float64Array(n * 2 * n);
  for (var i = 0; i < n; i++) {
    for (var j = 0; j < n; j++) {
      re[i*2*n+j] = A.re[i*n+j];
      im[i*2*n+j] = A.im[i*n+j];
    }
    re[i*2*n+n+i] = 1;
  }
  var w = 2 * n;
  for (var col = 0; col < n; col++) {
    // Find pivot
    var best = -1, bestMag = 0;
    for (var row = col; row < n; row++) {
      var mag = re[row*w+col]*re[row*w+col] + im[row*w+col]*im[row*w+col];
      if (mag > bestMag) { bestMag = mag; best = row; }
    }
    if (bestMag < 1e-20) return null; // singular
    // Swap rows
    if (best !== col) {
      for (var j2 = 0; j2 < w; j2++) {
        var tr = re[col*w+j2]; re[col*w+j2] = re[best*w+j2]; re[best*w+j2] = tr;
        var ti = im[col*w+j2]; im[col*w+j2] = im[best*w+j2]; im[best*w+j2] = ti;
      }
    }
    // Scale pivot row
    var pr = re[col*w+col], pi = im[col*w+col];
    var pmag = pr*pr + pi*pi;
    var invR = pr/pmag, invI = -pi/pmag;
    for (var j3 = 0; j3 < w; j3++) {
      var a = re[col*w+j3], b = im[col*w+j3];
      re[col*w+j3] = a*invR - b*invI;
      im[col*w+j3] = a*invI + b*invR;
    }
    // Eliminate
    for (var row2 = 0; row2 < n; row2++) {
      if (row2 === col) continue;
      var fr = re[row2*w+col], fi = im[row2*w+col];
      if (fr === 0 && fi === 0) continue;
      for (var j4 = 0; j4 < w; j4++) {
        var cr = re[col*w+j4], ci = im[col*w+j4];
        re[row2*w+j4] -= fr*cr - fi*ci;
        im[row2*w+j4] -= fr*ci + fi*cr;
      }
    }
  }
  var R = cMatNew(n, n);
  for (var i2 = 0; i2 < n; i2++)
    for (var j5 = 0; j5 < n; j5++) {
      R.re[i2*n+j5] = re[i2*w+n+j5];
      R.im[i2*n+j5] = im[i2*w+n+j5];
    }
  return R;
}

// ─── Compute residual projector I - P_Q (real) ─────
// Walk profiles are real, so we use the explicit truncated reconstruction:
//   Phi_hat(m,k) = (1/(m+1))[A_q0^m + 2 sum_{j=1}^{Q-1} Re(exp(πi j(m-2k)/(m+1)) A_qj^m)]
// Substituting A_qj^m = sum_l exp(πi j(m-2l)/(m+1)) Phi(m,l) gives a real projection:
//   P_Q(k,l) = (1/(m+1))[1 + 2 sum_{j=1}^{Q-1} cos(2πj(m-k-l)/(m+1))]
// At Q = ceil((m+1)/2)+1 (= 16 for m=30), the Dirichlet kernel completes and P_Q = I.
function computeResidualProjector(Q, m) {
  var sz = (m+1) * (m+1);
  var R = new Float64Array(sz);
  var inv = 1 / (m+1);
  for (var k = 0; k <= m; k++) {
    for (var l = 0; l <= m; l++) {
      var d = m - k - l;
      var sum = 1;  // j=0 term
      for (var j = 1; j < Q; j++) {
        sum += 2 * Math.cos(2 * Math.PI * j * d / (m+1));
      }
      var P_kl = sum * inv;
      R[k*(m+1)+l] = (k === l ? 1 : 0) - P_kl;
    }
  }
  return R;
}

// ─── Build random walk matrix P = D^{-1} A ─────────
function buildRWMatrix(n, edges) {
  var A = matNew(n);
  var deg = new Float64Array(n);
  for (var i = 0; i < edges.length; i++) {
    var u = edges[i][0], v = edges[i][1];
    A[u*n+v] += 1;
    deg[u] += 1;
  }
  // Add self-loops for zero-degree nodes
  for (var i2 = 0; i2 < n; i2++) {
    if (deg[i2] === 0) { A[i2*n+i2] = 1; deg[i2] = 1; }
  }
  // P = D^{-1} A
  var P = matNew(n);
  for (var i3 = 0; i3 < n; i3++) {
    var d = deg[i3];
    for (var j = 0; j < n; j++) P[i3*n+j] = A[i3*n+j] / d;
  }
  return P;
}

// ─── ER graph generation with seed ──────────────────
function seededRandom(seed) {
  // Simple LCG
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

function generateER(n, avgDeg, seed) {
  var rng = seededRandom(seed);
  var p = avgDeg / (n - 1);
  var edges = [];
  for (var i = 0; i < n; i++)
    for (var j = 0; j < n; j++)
      if (i !== j && rng() < p) edges.push([i, j]);
  return edges;
}

// ─── Main computation ───────────────────────────────
function computeAll(n, edges, m, maxQ, progressCb) {
  var P = buildRWMatrix(n, edges);
  var Pt = matTranspose(P, n);

  // Recurrence: Phi[k] for current m, prev[k] for m-1
  // Phi(0,0) = I, Phi(0,k) = 0 for k > 0
  var prev = [matEye(n)]; // prev[0] = I at m=0

  for (var step = 1; step <= m; step++) {
    var cur = [];
    for (var k = 0; k <= step; k++) {
      var A = (k > 0 && k - 1 < prev.length) ? matMul(prev[k-1], P, n) : matNew(n);
      var B = (k < prev.length) ? matMul(prev[k], Pt, n) : matNew(n);
      cur[k] = matAdd(A, B, n);
    }
    prev = cur;
    if (progressCb) progressCb(step, m);
  }

  // prev now holds Phi(m, 0..m)
  var Phi = prev; // array of m+1 n×n matrices

  // For each Q from 1 to maxQ, compute error metric
  var curveData = []; // [{Q, error, worstK}]

  for (var Q = 1; Q <= maxQ; Q++) {
    var RQ = computeResidualProjector(Q, m);
    if (!RQ) { curveData.push({Q:Q, error:0, worstK:0}); continue; }

    // Find worst k: max_k sum_{ij} |E(m,k)_{ij}|
    // E(m,k) = sum_{k'} RQ(k,k') Phi(m,k')
    var worstK = 0, worstErr = 0;
    for (var k2 = 0; k2 <= m; k2++) {
      // Compute sum_{ij} |sum_{k'} RQ(k2, k') * Phi(m,k')(i,j)|
      var errSum = 0;
      for (var ij = 0; ij < n*n; ij++) {
        var val = 0;
        for (var kp = 0; kp <= m; kp++) {
          val += RQ[k2*(m+1)+kp] * Phi[kp][ij];
        }
        errSum += Math.abs(val);
      }
      if (errSum > worstErr) { worstErr = errSum; worstK = k2; }
    }
    curveData.push({Q: Q, error: worstErr / n, worstK: worstK});
  }

  return {Phi: Phi, curveData: curveData, n: n, m: m};
}

// ─── Compute error heatmap for specific Q ───────────
function computeErrorHeatmap(Phi, n, m, Q) {
  var RQ = computeResidualProjector(Q, m);
  if (!RQ) return {mat: matNew(n), worstK: 0};

  var worstK = 0, worstErr = 0;
  for (var k = 0; k <= m; k++) {
    var errSum = 0;
    for (var ij = 0; ij < n*n; ij++) {
      var val = 0;
      for (var kp = 0; kp <= m; kp++) val += RQ[k*(m+1)+kp] * Phi[kp][ij];
      errSum += Math.abs(val);
    }
    if (errSum > worstErr) { worstErr = errSum; worstK = k; }
  }

  // Build the n×n error matrix for worstK
  var E = matNew(n);
  for (var ij2 = 0; ij2 < n*n; ij2++) {
    var val2 = 0;
    for (var kp2 = 0; kp2 <= m; kp2++) val2 += RQ[worstK*(m+1)+kp2] * Phi[kp2][ij2];
    E[ij2] = val2;
  }
  return {mat: E, worstK: worstK};
}

// ─── PuOr diverging colormap ────────────────────────
function puOrColor(v) {
  // v in [-1, 1], maps to purple (negative) -> white (0) -> orange (positive)
  var t = Math.max(-1, Math.min(1, v));
  var r, g, b;
  if (t < 0) {
    // Purple side: white to purple
    var s = -t;
    r = Math.round(255 - s * 128);
    g = Math.round(255 - s * 200);
    b = Math.round(255 - s * 50);
  } else {
    // Orange side: white to orange
    var s2 = t;
    r = Math.round(255 - s2 * 15);
    g = Math.round(255 - s2 * 155);
    b = Math.round(255 - s2 * 220);
  }
  return [r, g, b];
}

// CONTROLLER
// ═══════════════════════════════════════════════════
if (role === 'controller') {
  if (document.body) document.body.style.display = 'none';
  else document.addEventListener('DOMContentLoaded', function() { document.body.style.display = 'none'; });

  var state = {
    graphKey: 'er', erN: 100, erDeg: 6, erSeed: 42,
    selectedQ: -1, m: MAX_M,
    computing: false, curveData: null, n: 0, heatmap: null, heatmapQ: -1, worstK: -1
  };
  var storedPhi = null;

  function getGraphNames() {
    var names = ['er'];
    if (GRAPH_DB) {
      Object.keys(GRAPH_DB).forEach(function(k) {
        if (GRAPH_DB[k].n <= 500) names.push(k);
      });
    }
    return names;
  }

  function getEdgesAndN() {
    if (state.graphKey === 'er') {
      return {n: state.erN, edges: generateER(state.erN, state.erDeg, state.erSeed)};
    }
    var g = GRAPH_DB[state.graphKey];
    return {n: g.n, edges: g.edges};
  }

  function runComputation() {
    state.computing = true;
    state.curveData = null;
    state.heatmap = null;
    state.heatmapQ = -1;
    state.selectedQ = -1;
    broadcast();

    setTimeout(function() {
      var gd = getEdgesAndN();
      state.n = gd.n;
      var result = computeAll(gd.n, gd.edges, state.m, MAX_Q);
      storedPhi = result.Phi;
      state.curveData = result.curveData;
      state.computing = false;
      broadcast();
    }, 50);
  }

  function broadcast() {
    channel.postMessage({
      type: 'state',
      graphKey: state.graphKey,
      graphNames: getGraphNames(),
      erN: state.erN, erDeg: state.erDeg,
      selectedQ: state.selectedQ,
      m: state.m, n: state.n,
      computing: state.computing,
      curveData: state.curveData,
      heatmap: state.heatmap ? Array.from(state.heatmap) : null,
      heatmapQ: state.heatmapQ,
      worstK: state.worstK
    });
  }

  channel.onmessage = function(e) {
    var d = e.data;
    if (d.type === 'request-state') { broadcast(); return; }
    if (d.type === 'set-graph') {
      state.graphKey = d.key;
      runComputation();
      return;
    }
    if (d.type === 'set-er-deg') {
      state.erDeg = d.deg;
      if (state.graphKey === 'er') runComputation();
      return;
    }
    if (d.type === 'set-er-n') {
      state.erN = d.n;
      if (state.graphKey === 'er') runComputation();
      return;
    }
    if (d.type === 'select-q') {
      state.selectedQ = d.Q;
      if (storedPhi && d.Q > 0) {
        var result = computeErrorHeatmap(storedPhi, state.n, state.m, d.Q);
        state.heatmap = result.mat;
        state.heatmapQ = d.Q;
        state.worstK = result.worstK;
      }
      broadcast();
    }
  };

  runComputation();
  return;
}

// ═══════════════════════════════════════════════════
// PLOT PIECE
// ═══════════════════════════════════════════════════
if (piece === 'plot') {
  function setupPlot() {
    var container = document.createElement('div');
    container.className = 'wc-plot';
    var canvas = document.createElement('canvas');
    container.appendChild(canvas);
    document.body.appendChild(container);

    function draw(s) {
      var rect = canvas.getBoundingClientRect();
      var dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      var W = rect.width, H = rect.height;
      ctx.clearRect(0, 0, W, H);

      if (s.computing) {
        ctx.font = '28px "PT Sans", sans-serif';
        ctx.fillStyle = '#94a3b8';
        ctx.textAlign = 'center';
        ctx.fillText('Computing...', W/2, H/2);
        return;
      }
      if (!s.curveData || s.curveData.length === 0) return;

      var pad = {l:90, r:30, t:30, b:60};
      var pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;

      // Data — use log scale on y
      var data = s.curveData;
      // Find min and max non-zero error for log scale bounds
      var maxErr = 0, minErr = Infinity;
      data.forEach(function(d) {
        if (d.error > maxErr) maxErr = d.error;
        if (d.error > 1e-15 && d.error < minErr) minErr = d.error;
      });
      if (maxErr < 1e-15) maxErr = 1;
      if (minErr === Infinity) minErr = maxErr * 1e-12;
      // Round to nice log decades
      var logMax = Math.ceil(Math.log10(maxErr));
      var logMin = Math.floor(Math.log10(Math.max(minErr, maxErr * 1e-12)));
      if (logMin >= logMax) logMin = logMax - 1;
      var FLOOR = Math.pow(10, logMin); // anything below shows at floor

      function xPos(Q) { return pad.l + (Q - 1) / (MAX_Q - 1) * pw; }
      function yPos(err) {
        var v = Math.max(err, FLOOR);
        var lv = Math.log10(v);
        return pad.t + (1 - (lv - logMin) / (logMax - logMin)) * ph;
      }

      // Axes
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + ph);
      ctx.lineTo(pad.l + pw, pad.t + ph);
      ctx.stroke();

      // X ticks
      ctx.fillStyle = '#64748b';
      ctx.font = '20px "PT Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (var q = 1; q <= MAX_Q; q += (MAX_Q > 10 ? 2 : 1)) {
        var x = xPos(q);
        ctx.fillText(q, x, pad.t + ph + 8);
        ctx.beginPath(); ctx.moveTo(x, pad.t + ph); ctx.lineTo(x, pad.t + ph + 4); ctx.stroke();
      }
      ctx.font = '24px "PT Sans", sans-serif';
      ctx.fillText('Number of potentials (Q)', pad.l + pw/2, H - 10);

      // Y ticks: log decades
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.font = '18px "PT Sans", sans-serif';
      for (var lv = logMin; lv <= logMax; lv++) {
        var yv = Math.pow(10, lv);
        var y = yPos(yv);
        ctx.fillStyle = '#64748b';
        ctx.fillText('10' + (lv === 0 ? '⁰' : (lv > 0 ? '^' + lv : '⁻' + Math.abs(lv))), pad.l - 8, y);
        ctx.strokeStyle = '#f1f5f9';
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
        // Minor ticks
        for (var mt = 2; mt <= 9; mt++) {
          var ymv = yv * mt;
          if (ymv > Math.pow(10, logMax)) break;
          var ym = yPos(ymv);
          ctx.strokeStyle = '#f8fafc';
          ctx.beginPath(); ctx.moveTo(pad.l, ym); ctx.lineTo(pad.l + pw, ym); ctx.stroke();
        }
      }

      // Y label
      ctx.save();
      ctx.translate(20, pad.t + ph/2);
      ctx.rotate(-Math.PI/2);
      ctx.textAlign = 'center';
      ctx.font = '22px "PT Sans", sans-serif';
      ctx.fillStyle = '#64748b';
      ctx.fillText('Avg error (worst k)', 0, 0);
      ctx.restore();

      // Line
      ctx.strokeStyle = '#6366f1';
      ctx.lineWidth = 3;
      ctx.beginPath();
      data.forEach(function(d, i) {
        var x = xPos(d.Q), y = yPos(d.error);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Points
      data.forEach(function(d) {
        var x = xPos(d.Q), y = yPos(d.error);
        var isSelected = d.Q === s.selectedQ;
        ctx.beginPath();
        ctx.arc(x, y, isSelected ? 10 : 7, 0, 2*Math.PI);
        ctx.fillStyle = isSelected ? '#4f46e5' : '#6366f1';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      });
    }

    canvas.addEventListener('click', function(e) {
      var rect = canvas.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var W = rect.width;
      var pad = {l:90, r:30};
      var pw = W - pad.l - pad.r;
      var Q = Math.round(1 + (x - pad.l) / pw * (MAX_Q - 1));
      Q = Math.max(1, Math.min(MAX_Q, Q));
      channel.postMessage({type:'select-q', Q:Q});
    });

    channel.onmessage = function(e) {
      if (e.data.type === 'state') draw(e.data);
    };
    channel.postMessage({type:'request-state'});
    window.addEventListener('resize', function() { channel.postMessage({type:'request-state'}); });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupPlot);
  else setupPlot();
  return;
}

if (piece === 'heatmap') {
  function setupHeatmap() {
    var container = document.createElement('div');
    container.className = 'wc-heatmap';
    var title = document.createElement('div');
    title.className = 'wc-hm-title';
    var canvas = document.createElement('canvas');
    canvas.className = 'wc-hm-canvas';
    container.appendChild(title);
    container.appendChild(canvas);
    document.body.appendChild(container);

    function draw(s) {
      if (!s.heatmap || s.heatmapQ < 0) {
        title.textContent = 'Click a point on the curve';
        canvas.width = 1; canvas.height = 1;
        return;
      }
      var n = s.n;
      title.textContent = 'Error at Q=' + s.heatmapQ + ', worst k=' + s.worstK + ' (n=' + n + ')';
      canvas.width = n;
      canvas.height = n;
      var ctx = canvas.getContext('2d');
      var img = ctx.createImageData(n, n);

      // Find max absolute value for scaling
      var maxAbs = 0;
      for (var i = 0; i < n*n; i++) {
        var a = Math.abs(s.heatmap[i]);
        if (a > maxAbs) maxAbs = a;
      }
      if (maxAbs < 1e-15) maxAbs = 1;

      var data = img.data;
      for (var idx = 0; idx < n*n; idx++) {
        var v = s.heatmap[idx] / maxAbs;
        var c = puOrColor(v);
        data[idx*4] = c[0];
        data[idx*4+1] = c[1];
        data[idx*4+2] = c[2];
        data[idx*4+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
    }

    channel.onmessage = function(e) {
      if (e.data.type === 'state') draw(e.data);
    };
    channel.postMessage({type:'request-state'});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupHeatmap);
  else setupHeatmap();
  return;
}

        var nRow = document.createElement('div'); nRow.className = 'wc-ctrl-row';
        var nLabel = document.createElement('span'); nLabel.className = 'wc-ctrl-label'; nLabel.textContent = 'n';
        var nSlider = document.createElement('input'); nSlider.type = 'range'; nSlider.className = 'wc-ctrl-slider';
        nSlider.min = '20'; nSlider.max = '200'; nSlider.step = '10'; nSlider.value = s.erN;
        var nVal = document.createElement('span'); nVal.className = 'wc-ctrl-val'; nVal.textContent = s.erN;
        nSlider.onchange = function() { channel.postMessage({type:'set-er-n', n:parseInt(nSlider.value)}); };
        nSlider.oninput = function() { nVal.textContent = nSlider.value; };
        nRow.appendChild(nLabel); nRow.appendChild(nSlider); nRow.appendChild(nVal);
        erSec.appendChild(nRow);

        // Degree slider
        var dRow = document.createElement('div'); dRow.className = 'wc-ctrl-row';
        var dLabel = document.createElement('span'); dLabel.className = 'wc-ctrl-label'; dLabel.textContent = 'Avg degree';
        var dSlider = document.createElement('input'); dSlider.type = 'range'; dSlider.className = 'wc-ctrl-slider';
        dSlider.min = '2'; dSlider.max = '30'; dSlider.step = '1'; dSlider.value = s.erDeg;
        var dVal = document.createElement('span'); dVal.className = 'wc-ctrl-val'; dVal.textContent = s.erDeg;
        dSlider.onchange = function() { channel.postMessage({type:'set-er-deg', deg:parseInt(dSlider.value)}); };
        dSlider.oninput = function() { dVal.textContent = dSlider.value; };
        dRow.appendChild(dLabel); dRow.appendChild(dSlider); dRow.appendChild(dVal);
        erSec.appendChild(dRow);

        container.appendChild(erSec);
      }

      // Info
      if (s.computing) {
        var info = document.createElement('div'); info.className = 'wc-ctrl-info';
        info.textContent = 'Computing walk profiles (m=' + s.m + ')...';
        container.appendChild(info);
      } else if (s.curveData) {
        var info2 = document.createElement('div'); info2.className = 'wc-ctrl-info';
        info2.textContent = 'n=' + s.n + ', m=' + s.m + '. Click curve to see error heatmap.';
        container.appendChild(info2);
      }
    }

    channel.onmessage = function(e) {
      if (e.data.type === 'state') render(e.data);
    };
    channel.postMessage({type:'request-state'});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupControls);
  else setupControls();
  return;
}

// ═══════════════════════════════════════════════════
// STANDALONE
// ═══════════════════════════════════════════════════
function setupStandalone() {
  var app = document.createElement('div');
  app.className = 'wc-standalone';

  var left = document.createElement('div');
  left.className = 'wc-standalone-left';
  var ctrlDiv = document.createElement('div');
  ctrlDiv.className = 'wc-controls';
  var plotDiv = document.createElement('div');
  plotDiv.className = 'wc-plot';
  var plotCanvas = document.createElement('canvas');
  plotDiv.appendChild(plotCanvas);
  left.appendChild(ctrlDiv);
  left.appendChild(plotDiv);

  var right = document.createElement('div');
  right.className = 'wc-standalone-right';
  var hmWrap = document.createElement('div');
  hmWrap.className = 'wc-heatmap';
  var hmTitle = document.createElement('div');
  hmTitle.className = 'wc-hm-title';
  var hmCanvas = document.createElement('canvas');
  hmCanvas.className = 'wc-hm-canvas';
  hmWrap.appendChild(hmTitle);
  hmWrap.appendChild(hmCanvas);
  right.appendChild(hmWrap);

  app.appendChild(left);
  app.appendChild(right);
  document.body.appendChild(app);

  var state = {graphKey:'er', erN:100, erDeg:6, erSeed:42, selectedQ:-1, m:MAX_M,
    computing:false, curveData:null, n:0, heatmap:null, heatmapQ:-1, worstK:-1};
  var storedPhi = null;

  function getGraphNames() {
    var names = ['er'];
    if (GRAPH_DB) Object.keys(GRAPH_DB).forEach(function(k) { if (GRAPH_DB[k].n <= 500) names.push(k); });
    return names;
  }

  function getEdgesAndN() {
    if (state.graphKey === 'er') return {n:state.erN, edges:generateER(state.erN, state.erDeg, state.erSeed)};
    var g = GRAPH_DB[state.graphKey];
    return {n:g.n, edges:g.edges};
  }

  function runComputation() {
    state.computing = true; state.curveData = null; state.heatmap = null;
    state.heatmapQ = -1; state.selectedQ = -1;
    refresh();
    setTimeout(function() {
      var gd = getEdgesAndN();
      state.n = gd.n;
      var result = computeAll(gd.n, gd.edges, state.m, MAX_Q);
      storedPhi = result.Phi;
      state.curveData = result.curveData;
      state.computing = false;
      refresh();
    }, 50);
  }

  function refresh() {
    renderControls(ctrlDiv);
    drawPlot(plotCanvas, state);
    drawHeatmap(hmCanvas, hmTitle, state);
  }

  function renderControls(container) {
    container.innerHTML = '';
    var gs = document.createElement('div'); gs.className = 'wc-ctrl-section';
    var gl = document.createElement('div'); gl.className = 'wc-ctrl-label'; gl.textContent = 'Graph';
    gs.appendChild(gl);
    var sel = document.createElement('select'); sel.className = 'wc-ctrl-select';
    getGraphNames().forEach(function(name) {
      var o = document.createElement('option'); o.value = name;
      o.textContent = name==='er'?'Erd\u0151s\u2013R\u00e9nyi':name.replace(/-/g,' ');
      if(name===state.graphKey)o.selected=true; sel.appendChild(o);
    });
    sel.onchange = function() { state.graphKey=sel.value; runComputation(); };
    gs.appendChild(sel); container.appendChild(gs);

    if (state.graphKey === 'er') {
      var es = document.createElement('div'); es.className = 'wc-ctrl-section';
      // N
      var nr = document.createElement('div'); nr.className = 'wc-ctrl-row';
      var nl = document.createElement('span'); nl.className='wc-ctrl-label'; nl.textContent='n';
      var ns = document.createElement('input'); ns.type='range'; ns.className='wc-ctrl-slider';
      ns.min='20'; ns.max='200'; ns.step='10'; ns.value=state.erN;
      var nv = document.createElement('span'); nv.className='wc-ctrl-val'; nv.textContent=state.erN;
      ns.oninput=function(){nv.textContent=ns.value};
      ns.onchange=function(){state.erN=parseInt(ns.value);runComputation()};
      nr.appendChild(nl);nr.appendChild(ns);nr.appendChild(nv);es.appendChild(nr);
      // Deg
      var dr = document.createElement('div'); dr.className = 'wc-ctrl-row';
      var dl = document.createElement('span'); dl.className='wc-ctrl-label'; dl.textContent='Avg degree';
      var ds = document.createElement('input'); ds.type='range'; ds.className='wc-ctrl-slider';
      ds.min='2'; ds.max='30'; ds.step='1'; ds.value=state.erDeg;
      var dv = document.createElement('span'); dv.className='wc-ctrl-val'; dv.textContent=state.erDeg;
      ds.oninput=function(){dv.textContent=ds.value};
      ds.onchange=function(){state.erDeg=parseInt(ds.value);runComputation()};
      dr.appendChild(dl);dr.appendChild(ds);dr.appendChild(dv);es.appendChild(dr);
      container.appendChild(es);
    }

    if (state.computing) {
      var inf = document.createElement('div'); inf.className='wc-ctrl-info';
      inf.textContent='Computing (m='+state.m+')...'; container.appendChild(inf);
    } else if (state.curveData) {
      var inf2 = document.createElement('div'); inf2.className='wc-ctrl-info';
      inf2.textContent='n='+state.n+', m='+state.m+'. Click curve for heatmap.';
      container.appendChild(inf2);
    }
  }

  function drawPlot(canvas, s) {
    var rect = canvas.parentElement.getBoundingClientRect();
    var dpr = window.devicePixelRatio||1;
    canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
    var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    var W=rect.width, H=rect.height;
    ctx.clearRect(0,0,W,H);

    if(s.computing){ctx.font='24px "PT Sans"';ctx.fillStyle='#94a3b8';ctx.textAlign='center';ctx.fillText('Computing...',W/2,H/2);return}
    if(!s.curveData)return;

    var pad={l:80,r:20,t:20,b:50};
    var pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
    var data=s.curveData;
    var maxErr=0, minErr=Infinity;
    data.forEach(function(d){
      if(d.error>maxErr)maxErr=d.error;
      if(d.error>1e-15&&d.error<minErr)minErr=d.error;
    });
    if(maxErr<1e-15)maxErr=1;
    if(minErr===Infinity)minErr=maxErr*1e-12;
    var logMax=Math.ceil(Math.log10(maxErr));
    var logMin=Math.floor(Math.log10(Math.max(minErr,maxErr*1e-12)));
    if(logMin>=logMax)logMin=logMax-1;
    var FLOOR=Math.pow(10,logMin);

    function xP(Q){return pad.l+(Q-1)/(MAX_Q-1)*pw}
    function yP(err){var v=Math.max(err,FLOOR);var lv=Math.log10(v);return pad.t+(1-(lv-logMin)/(logMax-logMin))*ph}

    ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+ph);ctx.lineTo(pad.l+pw,pad.t+ph);ctx.stroke();

    // x ticks
    ctx.fillStyle='#64748b';ctx.font='16px "PT Sans"';ctx.textAlign='center';ctx.textBaseline='top';
    for(var q=1;q<=MAX_Q;q+=(MAX_Q>10?2:1)){var x=xP(q);ctx.fillText(q,x,pad.t+ph+6)}
    ctx.font='18px "PT Sans"';ctx.fillText('Q',pad.l+pw/2,H-6);

    // y ticks (log decades)
    ctx.textAlign='right';ctx.textBaseline='middle';ctx.font='14px "PT Sans"';
    for(var lvi=logMin;lvi<=logMax;lvi++){
      var yv=Math.pow(10,lvi);var y=yP(yv);
      ctx.fillStyle='#64748b';
      ctx.fillText('10^'+lvi, pad.l-6, y);
      ctx.strokeStyle='#f1f5f9';
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();
    }

    ctx.strokeStyle='#6366f1';ctx.lineWidth=2.5;ctx.beginPath();
    data.forEach(function(d,i){var x=xP(d.Q),y=yP(d.error);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
    ctx.stroke();

    data.forEach(function(d){
      var x=xP(d.Q),y=yP(d.error),isSel=d.Q===s.selectedQ;
      ctx.beginPath();ctx.arc(x,y,isSel?8:5,0,2*Math.PI);
      ctx.fillStyle=isSel?'#4f46e5':'#6366f1';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    });
  }

  function drawHeatmap(canvas, titleEl, s) {
    if(!s.heatmap||s.heatmapQ<0){
      titleEl.textContent='Click a point on the curve';
      canvas.width=1;canvas.height=1;return;
    }
    var n=s.n;
    titleEl.textContent='Error: Q='+s.heatmapQ+', worst k='+s.worstK;
    canvas.width=n;canvas.height=n;
    var ctx=canvas.getContext('2d');
    var img=ctx.createImageData(n,n);
    var maxAbs=0;
    for(var i=0;i<n*n;i++){var a=Math.abs(s.heatmap[i]);if(a>maxAbs)maxAbs=a}
    if(maxAbs<1e-15)maxAbs=1;
    var d=img.data;
    for(var idx=0;idx<n*n;idx++){
      var v=s.heatmap[idx]/maxAbs;var c=puOrColor(v);
      d[idx*4]=c[0];d[idx*4+1]=c[1];d[idx*4+2]=c[2];d[idx*4+3]=255;
    }
    ctx.putImageData(img,0,0);
  }

  plotCanvas.addEventListener('click', function(e) {
    var rect=plotCanvas.parentElement.getBoundingClientRect();
    var x=e.clientX-rect.left;
    var pad={l:80,r:20};var pw=rect.width-pad.l-pad.r;
    var Q=Math.round(1+(x-pad.l)/pw*(MAX_Q-1));
    Q=Math.max(1,Math.min(MAX_Q,Q));
    state.selectedQ=Q;
    if(storedPhi){
      var r=computeErrorHeatmap(storedPhi,state.n,state.m,Q);
      state.heatmap=r.mat;state.heatmapQ=Q;state.worstK=r.worstK;
    }
    refresh();
  });

  window.addEventListener('resize', refresh);
  runComputation();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupStandalone);
else setupStandalone();

})();
</script>
